    let scene, camera, renderer, currentGroup, controls, dimGroup;

    function init3D() {
      const container = document.getElementById('canvas-container');
      const width = container.clientWidth || 800, height = container.clientHeight || 600;
      scene = new THREE.Scene(); scene.background = new THREE.Color(0x1e1e1e);
      camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 100);
      renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
      renderer.setSize(width, height);
      renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.innerHTML = ''; container.appendChild(renderer.domElement);
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.autoRotate = isRotating; controls.autoRotateSpeed = 0.5;
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5,10,7); dirLight.castShadow = true; scene.add(dirLight);
      const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
      fillLight.position.set(-5, 5, -5); scene.add(fillLight);
      scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x2a2a2a));
      dimGroup = new THREE.Group(); scene.add(dimGroup);
      resetCamera(); build3DScene(); animate();
    }
    function animate() { requestAnimationFrame(animate); if(controls) controls.update(); if(renderer&&scene&&camera) renderer.render(scene,camera); }
    function resetCamera() { if(camera) camera.position.set(8,6,10); if(controls) controls.target.set(0,2,0); resetFocus(); }
    function resetFocus() { document.querySelectorAll('.view-focus-btn').forEach(btn=>btn.innerHTML='<i class="far fa-eye"></i>'); }

    function focusOnPart(partName) {
      if(!currentGroup || !controls) return;
      const meshes = currentGroup.children.filter(m=>m.name===partName);
      if(meshes.length===0) return;
      resetFocus();
      const box = new THREE.Box3(); meshes.forEach(m=>box.expandByObject(m));
      const center = new THREE.Vector3(); box.getCenter(center);
      controls.target.set(center.x, center.y, center.z);
      const activeItem = getActiveItem();
      if(activeItem && activeItem.dims && activeItem.dims[partName]) {
        const d = activeItem.dims[partName];
        const dist = partName === 'Back' ? 4 : Math.max(d.w,d.h,d.d)/50+2;
        camera.position.set(dist, center.y+dist/2, dist);
      }
    }

    function createDimensionLine(start, end, label, offset) {
      if(!showDimensions) return;
      const safeOffset = offset || new THREE.Vector3(0,0,0);
      const p1 = start.clone().add(safeOffset), p2 = end.clone().add(safeOffset);
      const mat = new THREE.LineBasicMaterial({ color:0xaaaaaa, transparent:true, opacity:0.5 });
      dimGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]), mat));
      const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
      canvas.width=512; canvas.height=128;
      ctx.fillStyle="rgba(0,0,0,0)"; ctx.fillRect(0,0,512,128);
      ctx.font="Bold 60px Segoe UI"; ctx.fillStyle="#ffffff"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.shadowColor="rgba(0,0,0,0.8)"; ctx.shadowBlur=4; ctx.fillText(label,256,64);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(canvas),transparent:true,depthTest:false}));
      sprite.position.copy(p1).lerp(p2,0.5); sprite.position.y+=0.05; sprite.scale.set(0.6,0.15,1);
      dimGroup.add(sprite);
    }

    /* ── hole helpers (same as original) ── */
    function buildSeatHoleOnlyShape(seatHole, dSeat) {
      if (seatHole === 'none') return null;
      const sw = dSeat.w*0.16, sd = dSeat.d*0.16, insetX=dSeat.w/2*0.75, insetY=dSeat.d/2*0.75;
      const paths = [];
      if (seatHole === 'center_hole') { const s=new THREE.Shape(); s.absarc(0,0,Math.min(sw,sd)*1.3,0,Math.PI*2,false); paths.push(s); }
      else if (seatHole === 'slotted') { for(let i=-1;i<=1;i++){const hx=i*sw*1.1;const s=new THREE.Shape();s.moveTo(hx-sw*0.16,-sd*1.35);s.lineTo(hx+sw*0.16,-sd*1.35);s.lineTo(hx+sw*0.16,sd*1.35);s.lineTo(hx-sw*0.16,sd*1.35);s.closePath();paths.push(s);} }
      else if (seatHole === 'three_vert_lines') { for(let i=-1;i<=1;i++){const hx=i*(dSeat.w/3.6);const s=new THREE.Shape();s.moveTo(hx-sw*0.22,-sd*2.0);s.lineTo(hx+sw*0.22,-sd*2.0);s.lineTo(hx+sw*0.22,sd*2.0);s.lineTo(hx-sw*0.22,sd*2.0);s.closePath();paths.push(s);} }
      else if (seatHole === 'three_horiz_lines') { for(let i=-1;i<=1;i++){const hy=i*(dSeat.d/3.6);const s=new THREE.Shape();s.moveTo(-dSeat.w/2*0.75,hy-sd*0.22);s.lineTo(dSeat.w/2*0.75,hy-sd*0.22);s.lineTo(dSeat.w/2*0.75,hy+sd*0.22);s.lineTo(-dSeat.w/2*0.75,hy+sd*0.22);s.closePath();paths.push(s);} }
      else if (seatHole === 'u_shape_cutout') { const s=new THREE.Shape();s.moveTo(-sw,-dSeat.d/2+0.015);s.lineTo(sw,-dSeat.d/2+0.015);s.lineTo(sw,0);s.absarc(0,0,sw,0,Math.PI,false);s.lineTo(-sw,-dSeat.d/2+0.015);paths.push(s); }
      else if (seatHole === 'crescent_cutout') { const s=new THREE.Shape();const frontY=dSeat.d/2*0.88;s.absarc(0,frontY,sw*1.1,Math.PI,0,false);s.absarc(0,frontY,sw*0.55,0,Math.PI,true);paths.push(s); }
      else if (seatHole === 'vent_holes') { for(let xi=-1;xi<=1;xi++) for(let yi=-1;yi<=1;yi++){const s=new THREE.Shape();s.absarc(xi*sw*0.9,yi*sd*0.9,sw*0.22,0,Math.PI*2,false);paths.push(s);} }
      else if (seatHole === 'woven_insert_hole') { const s=new THREE.Shape();s.moveTo(-sw*1.75,-sd*1.75);s.lineTo(sw*1.75,-sd*1.75);s.lineTo(sw*1.75,sd*1.75);s.lineTo(-sw*1.75,sd*1.75);s.closePath();paths.push(s); }
      else if (seatHole === 'corner_cutouts') { [[insetX,insetY],[-insetX,insetY],[insetX,-insetY],[-insetX,-insetY]].forEach(([hx,hy])=>{const s=new THREE.Shape();s.absarc(hx,hy,sw*0.4,0,Math.PI*2,false);paths.push(s);}); }
      return paths.length > 0 ? paths : null;
    }

    function addCurvedSeatHoles(seatHole, dSeat, seatTopY, seatHex, SCALE) {
      if (seatHole === 'none') return;
      const holePaths = buildSeatHoleOnlyShape(seatHole, dSeat); if (!holePaths) return;
      const c = new THREE.Color(seatHex); c.multiplyScalar(0.22);
      const holeDepth = dSeat.h * 3.0;
      const holeMat = new THREE.MeshStandardMaterial({ color:c, roughness:0.9, metalness:0, side:THREE.DoubleSide });
      holePaths.forEach(shape => {
        try {
          const geo = new THREE.ExtrudeGeometry(shape, { depth: holeDepth, bevelEnabled: false });
          geo.rotateX(-Math.PI / 2); geo.translate(0, seatTopY + dSeat.h * 0.5, 0);
          const mesh = new THREE.Mesh(geo, holeMat); mesh.name = 'Seat'; mesh.renderOrder = 1;
          currentGroup.add(mesh);
        } catch(e) {}
      });
    }

    function punchSeatHoles(s, seatHole, dSeat) {
      if (seatHole === 'none') return;
      const sw=dSeat.w*0.16, sd=dSeat.d*0.16, insetX=dSeat.w/2*0.75, insetY=dSeat.d/2*0.75;
      if (seatHole === 'center_hole') { const h=new THREE.Path();h.absarc(0,0,Math.min(sw,sd)*1.3,0,Math.PI*2,true);s.holes.push(h); }
      else if (seatHole === 'slotted') { for(let i=-1;i<=1;i++){const h=new THREE.Path();const hx=i*sw*1.1;h.moveTo(hx-sw*0.16,-sd*1.35);h.lineTo(hx+sw*0.16,-sd*1.35);h.lineTo(hx+sw*0.16,sd*1.35);h.lineTo(hx-sw*0.16,sd*1.35);h.closePath();s.holes.push(h);} }
      else if (seatHole === 'three_vert_lines') { for(let i=-1;i<=1;i++){const hx=i*(dSeat.w/3.6);const h=new THREE.Path();h.moveTo(hx-sw*0.22,-sd*2.0);h.lineTo(hx+sw*0.22,-sd*2.0);h.lineTo(hx+sw*0.22,sd*2.0);h.lineTo(hx-sw*0.22,sd*2.0);h.closePath();s.holes.push(h);} }
      else if (seatHole === 'three_horiz_lines') { for(let i=-1;i<=1;i++){const hy=i*(dSeat.d/3.6);const h=new THREE.Path();h.moveTo(-dSeat.w/2*0.75,hy-sd*0.22);h.lineTo(dSeat.w/2*0.75,hy-sd*0.22);h.lineTo(dSeat.w/2*0.75,hy+sd*0.22);h.lineTo(-dSeat.w/2*0.75,hy+sd*0.22);h.closePath();s.holes.push(h);} }
      else if (seatHole === 'u_shape_cutout') { const h=new THREE.Path();h.moveTo(-sw,-dSeat.d/2+0.015);h.lineTo(sw,-dSeat.d/2+0.015);h.lineTo(sw,0);h.absarc(0,0,sw,0,Math.PI,false);h.lineTo(-sw,-dSeat.d/2+0.015);s.holes.push(h); }
      else if (seatHole === 'crescent_cutout') { const h=new THREE.Path();const frontY=dSeat.d/2*0.88;h.absarc(0,frontY,sw*1.1,Math.PI,0,false);h.absarc(0,frontY,sw*0.55,0,Math.PI,true);s.holes.push(h); }
      else if (seatHole === 'vent_holes') { for(let xi=-1;xi<=1;xi++) for(let yi=-1;yi<=1;yi++){const h=new THREE.Path();h.absarc(xi*sw*0.9,yi*sd*0.9,sw*0.22,0,Math.PI*2,true);s.holes.push(h);} }
      else if (seatHole === 'woven_insert_hole') { const h=new THREE.Path();h.moveTo(-sw*1.75,-sd*1.75);h.lineTo(sw*1.75,-sd*1.75);h.lineTo(sw*1.75,sd*1.75);h.lineTo(-sw*1.75,sd*1.75);h.closePath();s.holes.push(h); }
      else if (seatHole === 'corner_cutouts') { [[insetX,insetY],[-insetX,insetY],[insetX,-insetY],[-insetX,-insetY]].forEach(([hx,hy])=>{const h=new THREE.Path();h.absarc(hx,hy,sw*0.4,0,Math.PI*2,true);s.holes.push(h);}); }
    }

    /* ==========================================================================
       3D SCENE BUILD
       ========================================================================== */
    function build3DScene() {
      if (!scene) return;
      if (currentGroup) scene.remove(currentGroup);
      currentGroup = new THREE.Group(); dimGroup.clear();

      const activeItem = getActiveItem(); if (!activeItem) return;
      const SCALE = 50;

      const itemDims       = activeItem.dims       || {};
      const itemShapes     = activeItem.shapes     || {};
      const itemHoles      = activeItem.holes      || {};
      const itemCarvings   = activeItem.carvings   || {};
      const itemSelections = activeItem.selections || {};

      const getDims = p => { const d=itemDims[p]||{w:50,h:50,d:50}; return {w:d.w/SCALE,h:d.h/SCALE,d:d.d/SCALE}; };

      const dSeat = getDims('Seat');
      const dLeg  = getDims('Legs');
      const dBack = getDims('Back');

      const seatShape   = itemShapes['Seat'] || 'square_plank';
      const legShape    = itemShapes['Legs'] || 'straight_post_s';
      const isRocking   = legShape === 'rocking_runners';

      const isRoundSeat = ['round_plank','oct_plank','hex_plank'].includes(seatShape);
      const seatInset   = isRoundSeat ? 0.72 : 1.0;
      const locX        = (dSeat.w/2 * seatInset) - (dLeg.w/2);
      const locZ        = (dSeat.d/2 * seatInset) - (dLeg.d/2);
      const yL          = dLeg.h / 2;
      const yS          = dLeg.h + dSeat.h / 2;
      const seatTopY    = dLeg.h + dSeat.h;
      const backZ       = -(dSeat.d/2) + (dBack.d/2);
      const yB          = dLeg.h + dSeat.h + dBack.h/2;

      /* ── MATERIAL FACTORY ── */
      const getMat = (hex, ck) => {
        ck = ck || 'none';
        const cStyle = carvingDB[ck] || carvingDB.none;
        const matKey = Object.keys(materialDB).find(k=>materialDB[k].hex.toLowerCase()===hex.toLowerCase());
        const rMap = {narra:0.35,kamagong:0.2,molave:0.32,mahogany:0.28,tanguile:0.38,yakal:0.22,oak:0.42,pine:0.5,rubberwood:0.46,bamboo:0.44,marble_white:0.1,marble_black:0.08,glass_clear:0.05,brushed_steel:0.35};
        const roughness = rMap[matKey]!==undefined ? rMap[matKey] : 0.5;
        const metalness = (matKey==='brushed_steel')?0.85:(matKey==='glass_clear')?0.1:(matKey==='marble_white'||matKey==='marble_black')?0.06:0.04;
        const mat = new THREE.MeshStandardMaterial({color:hex,roughness,metalness,side:THREE.DoubleSide});
        if (matKey === 'glass_clear') { mat.transparent = true; mat.opacity = 0.55; }
        if (ck !== 'none') {
          const tex = createPatternTexture(ck).clone();
          const rx = (cStyle.style&&cStyle.style.repeatX) ? cStyle.style.repeatX : 1;
          const ry = (cStyle.style&&cStyle.style.repeatY) ? cStyle.style.repeatY : 1;
          tex.repeat.set(rx,ry); tex.needsUpdate=true;
          mat.bumpMap=tex; mat.bumpScale=0.1;
        }
        return mat;
      };

      const addMesh = (name,geo,hex,carving,x,y,z,rx=0,ry=0,rz=0) => {
        if (!geo) return;
        const mesh = new THREE.Mesh(geo, getMat(hex,carving));
        mesh.position.set(x,y,z); mesh.rotation.set(rx,ry,rz);
        mesh.name=name; mesh.castShadow=true; mesh.receiveShadow=true;
        currentGroup.add(mesh); return mesh;
      };

      const sg = (fn, fb) => {
        try { const g=fn(); return (g&&g.attributes&&g.attributes.position&&g.attributes.position.count>0)?g:fb; }
        catch(e) { console.warn('geo err:',e.message); return fb; }
      };

      if (isRocking || seatShape === 'rocking_seat') {
        buildRockingChair3D(getDims, itemShapes, itemHoles, itemCarvings, itemSelections, addMesh, getMat, sg, seatTopY, yB, backZ, dSeat, dBack, dLeg, SCALE);
      } else {
        buildStandardChair3D(getDims, itemShapes, itemHoles, itemCarvings, itemSelections, addMesh, getMat, sg, seatTopY, yB, backZ, dSeat, dBack, dLeg, locX, locZ, yL, yS, seatShape, legShape, SCALE);
      }

      if (activeItem.isLeftArmVisible || activeItem.isRightArmVisible) {
        buildArmrests(getDims, itemShapes, itemCarvings, itemSelections, addMesh, sg, seatTopY, yB, backZ, dSeat, dLeg, dBack, isRocking, activeItem);
      }

      const gs=activeItem.globalScale||{x:1,y:1,z:1};
      currentGroup.scale.set(gs.x||1,gs.y||1,gs.z||1);
      scene.add(currentGroup);

      if(showDimensions){
        const gx=gs.x||1,gy=gs.y||1,gz=gs.z||1;
        createDimensionLine(new THREE.Vector3(-dSeat.w/2*gx,0,locZ*gz),new THREE.Vector3(dSeat.w/2*gx,0,locZ*gz),Math.round(dSeat.w*50*gx)+'cm',new THREE.Vector3(0,0,dLeg.d*gz));
        createDimensionLine(new THREE.Vector3(-locX*gx,0,(dSeat.d/2+0.12)*gz),new THREE.Vector3(-locX*gx,dLeg.h*gy,(dSeat.d/2+0.12)*gz),Math.round(dLeg.h*50*gy)+'cm',new THREE.Vector3(-dLeg.w*gx,0,0));
        createDimensionLine(new THREE.Vector3((locX+0.12)*gx,yS*gy,backZ*gz),new THREE.Vector3((locX+0.12)*gx,(yB+dBack.h/2)*gy,backZ*gz),Math.round(dBack.h*50*gy)+'cm',new THREE.Vector3(dLeg.w*gx,0,0));
      }
    }

    /* ==========================================================================
       ROCKING CHAIR 3D BUILD
       ========================================================================== */
    function buildRockingChair3D(getDims, itemShapes, itemHoles, itemCarvings, itemSelections, addMesh, getMat, sg, seatTopY, yB, backZ, dSeat, dBack, dLeg, SCALE) {
      const legHex  = itemSelections['Legs']  || '#8B4513';
      const seatHex = itemSelections['Seat']  || '#8B4513';
      const backHex = itemSelections['Back']  || '#8B4513';
      const legCarv = itemCarvings['Legs']    || 'none';
      const seatCarv= itemCarvings['Seat']    || 'none';
      const backCarv= itemCarvings['Back']    || 'none';
      const seatHole= itemHoles['Seat']       || 'none';

      const legR     = dLeg.w * 0.5;
      const legH     = dLeg.h;
      const sW       = dSeat.w;
      const sD       = dSeat.d;
      const sH       = dSeat.h;

      const legInX   = sW * 0.38;
      const fLegZ    = sD * 0.30;
      const bLegZ    = -sD * 0.34;

      const fLegH = legH * 1.02;
      const bLegH = legH * 0.85;

      const seatY = fLegH + sH / 2;

      const runnerR     = 0.08;
      const arcR        = sD * 1.55;
      const runnerExtraF = sD * 0.28;
      const runnerExtraB = sD * 0.22;

      class RockerCurve extends THREE.Curve {
        constructor(startZ, endZ, arcRadius) {
          super();
          this.startZ = startZ; this.endZ = endZ; this.arcRadius = arcRadius;
          this.midZ = (startZ + endZ) / 2;
          this.centerY = Math.sqrt(arcRadius * arcRadius - Math.pow((endZ - startZ)/2, 2));
        }
        getPoint(t) {
          const z = this.startZ + (this.endZ - this.startZ) * t;
          const dz = z - this.midZ;
          const y = this.centerY - Math.sqrt(Math.max(0, this.arcRadius * this.arcRadius - dz * dz));
          return new THREE.Vector3(0, y, z);
        }
      }

      const rockerStartZ = fLegZ + runnerExtraF;
      const rockerEndZ   = bLegZ - runnerExtraB;

      const testCurve = new RockerCurve(rockerStartZ, rockerEndZ, arcR);
      const testMid = testCurve.getPoint(0.5);
      const runnerYOffset = -testMid.y;

      class RockerCurveLifted extends THREE.Curve {
        constructor(xOff, startZ, endZ, arcRadius, yOff) {
          super();
          this.xOff = xOff; this.startZ = startZ; this.endZ = endZ;
          this.arcRadius = arcRadius; this.yOff = yOff;
          this.midZ = (startZ + endZ) / 2;
          this.centerY = Math.sqrt(Math.max(0, arcRadius * arcRadius - Math.pow((endZ - startZ)/2, 2)));
        }
        getPoint(t) {
          const z = this.startZ + (this.endZ - this.startZ) * t;
          const dz = z - this.midZ;
          const y = this.centerY - Math.sqrt(Math.max(0, this.arcRadius * this.arcRadius - dz * dz));
          return new THREE.Vector3(this.xOff, y + this.yOff, z);
        }
      }

      [-legInX, legInX].forEach(xOff => {
        const curve = new RockerCurveLifted(xOff, rockerStartZ, rockerEndZ, arcR, runnerYOffset);
        const geo = sg(() => new THREE.TubeGeometry(curve, 60, runnerR, 10, false),
                        new THREE.CylinderGeometry(runnerR, runnerR, Math.abs(rockerEndZ - rockerStartZ), 10));
        addMesh('Legs', geo, legHex, legCarv, 0, 0, 0);
      });

      const fLegGeo = new THREE.CylinderGeometry(legR * 0.72, legR, fLegH, 14);

      const getRunnerY = (xOff, z) => {
        const midZ = (rockerStartZ + rockerEndZ) / 2;
        const dz = z - midZ;
        const centerY = Math.sqrt(Math.max(0, arcR * arcR - Math.pow((rockerEndZ - rockerStartZ)/2, 2)));
        return centerY - Math.sqrt(Math.max(0, arcR * arcR - dz * dz)) + runnerYOffset;
      };

      [-legInX, legInX].forEach(xOff => {
        const baseY = getRunnerY(xOff, fLegZ);
        const legCenterY = baseY + fLegH / 2;
        addMesh('Legs', new THREE.CylinderGeometry(legR*0.72, legR, fLegH, 14), legHex, legCarv, xOff, legCenterY, fLegZ, 0.06, 0, 0);
      });

      [-legInX, legInX].forEach(xOff => {
        const baseY = getRunnerY(xOff, bLegZ);
        const legCenterY = baseY + bLegH / 2;
        addMesh('Legs', new THREE.CylinderGeometry(legR*0.65, legR, bLegH, 14), legHex, legCarv, xOff, legCenterY, bLegZ, -0.10, 0, 0);
      });

      const stretR = legR * 0.48;
      const stretY1 = fLegH * 0.28;
      const stretY2 = fLegH * 0.52;
      const stretLen = legInX * 2 - legR * 0.6;

      addMesh('Legs', new THREE.CylinderGeometry(stretR, stretR, stretLen, 10), legHex, legCarv, 0, stretY1, fLegZ, 0, 0, Math.PI/2);
      addMesh('Legs', new THREE.CylinderGeometry(stretR, stretR, stretLen, 10), legHex, legCarv, 0, stretY1*0.9, bLegZ, 0, 0, Math.PI/2);
      const sidStL = Math.abs(fLegZ - bLegZ) * 0.72;
      const sidStZ = (fLegZ + bLegZ) / 2;
      [-legInX, legInX].forEach(xOff => {
        addMesh('Legs', new THREE.CylinderGeometry(stretR, stretR, sidStL, 10), legHex, legCarv, xOff, stretY2, sidStZ, Math.PI/2 * 0.08, 0, 0);
      });

      const seatGeo = sg(() => {
        const s = new THREE.Shape();
        s.moveTo(-sW/2, -sD/2); s.lineTo(sW/2, -sD/2);
        s.lineTo(sW/2, sD/2);   s.lineTo(-sW/2, sD/2); s.closePath();
        punchSeatHoles(s, seatHole, dSeat);
        const g = new THREE.ExtrudeGeometry(s, { depth: sH, bevelEnabled: true, bevelSize: 0.008, bevelThickness: 0.008, bevelSegments: 2 });
        g.translate(0, 0, -sH/2); g.rotateX(Math.PI/2); return g;
      }, new THREE.BoxGeometry(sW, sH, sD));

      const frontLegTopY = getRunnerY(-legInX, fLegZ) + fLegH;
      const backLegTopY  = getRunnerY(-legInX, bLegZ) + bLegH;
      const seatTiltAngle = Math.atan2(frontLegTopY - backLegTopY, Math.abs(fLegZ - bLegZ)) * -0.7;
      const seatCenterY   = (frontLegTopY + backLegTopY) / 2 + sH / 2;
      const seatCenterZ   = (fLegZ + bLegZ) / 2;
      addMesh('Seat', seatGeo, seatHex, seatCarv, 0, seatCenterY, seatCenterZ, seatTiltAngle, 0, 0);

      const backShape = itemShapes['Back'] || 'rocking_back';
      const backTopY  = backLegTopY + dBack.h;
      const backBaseY = backLegTopY;
      const backCenterY = (backTopY + backBaseY) / 2;
      const backTiltAngle = -0.22;
      const bpW = Math.max(dLeg.w*0.95, 0.04);

      if (backShape === 'rocking_back' || backShape === 'simple_panel' || backShape === 'padded_back') {
        const geo = sg(() => {
          const hw=dBack.w/2, hh=dBack.h/2;
          const s = new THREE.Shape();
          s.moveTo(-hw, -hh); s.lineTo(hw, -hh); s.lineTo(hw, hh); s.lineTo(-hw, hh); s.closePath();
          punchBackHolesRocking(s, itemHoles['Back'] || 'none', dBack);
          const bvl = backShape === 'padded_back';
          const g = new THREE.ExtrudeGeometry(s, { depth: dBack.d, bevelEnabled: bvl, bevelSize: bvl?0.014:0, bevelThickness: 0.014, bevelSegments: 2 });
          g.translate(0,0,-dBack.d/2); return g;
        }, new THREE.BoxGeometry(dBack.w, dBack.h, dBack.d));
        addMesh('Back', new THREE.BoxGeometry(bpW, dBack.h*1.08, bpW), backHex, 'none', -(dBack.w/2-bpW/2), backCenterY, bLegZ, backTiltAngle, 0, 0);
        addMesh('Back', new THREE.BoxGeometry(bpW, dBack.h*1.08, bpW), backHex, 'none',  (dBack.w/2-bpW/2), backCenterY, bLegZ, backTiltAngle, 0, 0);
        addMesh('Back', geo, backHex, backCarv, 0, backCenterY, bLegZ, backTiltAngle, 0, 0);
      } else if (backShape === 'spindle_back' || backShape === 'ladder_back' || backShape === 'slat_back') {
        addMesh('Back', new THREE.BoxGeometry(bpW, dBack.h*1.08, bpW), backHex, 'none', -(dBack.w/2-bpW/2), backCenterY, bLegZ, backTiltAngle, 0, 0);
        addMesh('Back', new THREE.BoxGeometry(bpW, dBack.h*1.08, bpW), backHex, 'none',  (dBack.w/2-bpW/2), backCenterY, bLegZ, backTiltAngle, 0, 0);
        addMesh('Back', new THREE.BoxGeometry(dBack.w+bpW, bpW, dBack.d*1.1), backHex, 'none', 0, backTopY - bpW/2, bLegZ, backTiltAngle, 0, 0);
        addMesh('Back', new THREE.BoxGeometry(dBack.w+bpW, bpW, dBack.d*1.1), backHex, 'none', 0, backBaseY + bpW/2, bLegZ, backTiltAngle, 0, 0);

        if (backShape === 'spindle_back') {
          const cnt=5, sR=dBack.w/(cnt*4.5), step=(dBack.w-bpW*2)/(cnt-1);
          for(let i=0;i<cnt;i++)
            addMesh('Back', new THREE.CylinderGeometry(sR, sR*1.2, dBack.h*0.82, 14), backHex, 'none', -dBack.w/2+bpW+i*step, backCenterY, bLegZ, backTiltAngle, 0, 0);
        } else if (backShape === 'ladder_back') {
          const cnt=4, step=dBack.h/(cnt-1);
          for(let i=0;i<cnt;i++)
            addMesh('Back', new THREE.BoxGeometry(dBack.w, bpW*0.85, dBack.d), backHex, 'none', 0, backBaseY+i*step, bLegZ, backTiltAngle, 0, 0);
        } else {
          const cnt=4, totalW=dBack.w-bpW*2, slatW=totalW/(cnt*2-1), step=slatW*2;
          for(let i=0;i<cnt;i++)
            addMesh('Back', new THREE.BoxGeometry(slatW, dBack.h*0.82, dBack.d*0.85), backHex, 'none', -totalW/2+i*step+slatW/2, backCenterY, bLegZ, backTiltAngle, 0, 0);
        }
      } else {
        addMesh('Back', new THREE.BoxGeometry(dBack.w, dBack.h, dBack.d), backHex, backCarv, 0, backCenterY, bLegZ, backTiltAngle, 0, 0);
      }
    }

    function punchBackHolesRocking(s, backHole, dBack) {
      if (backHole === 'none') return;
      const bw = dBack.w * 0.12, bh = dBack.h * 0.11;
      const safeW = dBack.w * 0.38, safeH = dBack.h * 0.38;
      if (backHole === 'center_slot') { const hw=Math.min(bw,safeW*0.3),hh=Math.min(bh*2.2,safeH);const h=new THREE.Path();h.moveTo(-hw,-hh);h.lineTo(hw,-hh);h.lineTo(hw,hh);h.lineTo(-hw,hh);h.closePath();s.holes.push(h); }
      else if (backHole === 'handle_cutout') { const h=new THREE.Path();h.absellipse(0,dBack.h*0.2,Math.min(bw*1.6,safeW),Math.min(bh*0.5,safeH*0.25),0,Math.PI*2,true,0);s.holes.push(h); }
      else if (backHole === 'three_slots') { const sw_=Math.min(bw*0.38,safeW*0.12),sh_=Math.min(bh*2.2,safeH*0.8);const stepX=dBack.w*0.26;[-1,0,1].forEach(i=>{const hx=i*stepX;const h=new THREE.Path();h.moveTo(hx-sw_,-sh_);h.lineTo(hx+sw_,-sh_);h.lineTo(hx+sw_,sh_);h.lineTo(hx-sw_,sh_);h.closePath();s.holes.push(h);}); }
      else if (backHole === 'heart_cutout') { const scl=Math.min(safeW/(bw*1.8),safeH/(bh*2.8),1.0),sw_=bw*scl,sh_=bh*scl,cx=0,cy=sh_*0.8;const h=new THREE.Path();h.moveTo(cx,cy+sh_*0.4);h.bezierCurveTo(-sw_*0.1,cy+sh_*1.2,-sw_*1.8,cy+sh_*1.2,-sw_*1.8,cy);h.bezierCurveTo(-sw_*1.8,cy-sh_*1.0,cx,cy-sh_*2.0,cx,cy-sh_*2.4);h.bezierCurveTo(cx,cy-sh_*2.0,sw_*1.8,cy-sh_*1.0,sw_*1.8,cy);h.bezierCurveTo(sw_*1.8,cy+sh_*1.2,sw_*0.1,cy+sh_*1.2,cx,cy+sh_*0.4);h.closePath();s.holes.push(h); }
      else if (backHole === 'arch_window') { const aw=Math.min(bw*1.55,safeW*0.75),ab=-Math.min(bh*2.1,safeH*0.75),at=Math.min(bh*0.6,safeH*0.2);const h=new THREE.Path();h.moveTo(-aw,ab);h.lineTo(-aw,at);h.absarc(0,at,aw,Math.PI,0,true);h.lineTo(aw,ab);h.closePath();s.holes.push(h); }
    }

    /* ==========================================================================
       STANDARD CHAIR 3D BUILD
       ========================================================================== */
    function buildStandardChair3D(getDims, itemShapes, itemHoles, itemCarvings, itemSelections, addMesh, getMat, sg, seatTopY, yB, backZ, dSeat, dBack, dLeg, locX, locZ, yL, yS, seatShape, legShape, SCALE) {
      const legCarv  = itemCarvings['Legs']    || 'none';
      const legHex   = itemSelections['Legs']  || '#8B4513';
      const seatHole = itemHoles['Seat']       || 'none';
      const seatCarv = seatShape==='padded_seat' ? 'padded' : (itemCarvings['Seat']||'none');
      const seatHex  = itemSelections['Seat']  || '#8B4513';
      const backShape= itemShapes['Back']      || 'simple_panel';
      const backHole = itemHoles['Back']       || 'none';
      const backHex  = itemSelections['Back']  || '#8B4513';
      const backCarv = backShape==='padded_back' ? 'padded' : (itemCarvings['Back']||'none');

      const buildOneLeg = () => {
        if (legShape==='straight_post_r') return new THREE.CylinderGeometry(dLeg.w/2,dLeg.w/2,dLeg.h,24);
        if (legShape==='tapered_round') return new THREE.CylinderGeometry(dLeg.w*0.22,dLeg.w/2,dLeg.h,24);
        if (legShape==='tapered_square') { const g=new THREE.CylinderGeometry(dLeg.w*0.32,dLeg.w/2,dLeg.h,4);g.rotateY(Math.PI/4);return g; }
        if (legShape==='fluted_round') return new THREE.CylinderGeometry(dLeg.w/2,dLeg.w/2,dLeg.h,12);
        if (legShape==='turned_leg') {
          const g=new THREE.CylinderGeometry(dLeg.w/2,dLeg.w/2,dLeg.h,28,14);
          const pos=g.attributes.position;
          for(let i=0;i<pos.count;i++){const yv=pos.getY(i);const sc=1+Math.sin((yv/dLeg.h)*Math.PI*5+0.5)*0.26;pos.setX(i,pos.getX(i)*sc);pos.setZ(i,pos.getZ(i)*sc);}
          g.computeVertexNormals();return g;
        }
        if (legShape==='cabriole') return sg(()=>new THREE.TubeGeometry(new LegCurve('cabriole',dLeg.w,dLeg.h),28,dLeg.w*0.28,8,false),new THREE.CylinderGeometry(dLeg.w*0.3,dLeg.w/2,dLeg.h,10));
        if (legShape==='saber') return sg(()=>new THREE.TubeGeometry(new LegCurve('saber',dLeg.w*0.5,dLeg.h),28,dLeg.w*0.28,8,false),new THREE.BoxGeometry(dLeg.w,dLeg.h,dLeg.d));
        return new THREE.BoxGeometry(dLeg.w,dLeg.h,dLeg.d);
      };

      if (legShape==='hairpin') {
        const pinR=dLeg.w*0.09,offX=dLeg.w*0.2;
        [[-locX,-locZ],[locX,-locZ],[-locX,locZ],[locX,locZ]].forEach(([lx,lz])=>{
          const gp=sg(()=>new THREE.TubeGeometry(new HairpinCurve(dLeg.w*0.55,dLeg.h),22,pinR,6,false),new THREE.CylinderGeometry(pinR,pinR,dLeg.h,6));
          addMesh('Legs',gp,legHex,legCarv,lx-offX,yL,lz);
          addMesh('Legs',gp,legHex,legCarv,lx+offX,yL,lz);
        });
      } else if (legShape==='saber') {
        const ang=0.18,gL=buildOneLeg();
        addMesh('Legs',gL,legHex,legCarv,-locX,yL,-locZ,0,ang,0);
        addMesh('Legs',gL,legHex,legCarv,locX,yL,-locZ,0,-ang,0);
        addMesh('Legs',gL,legHex,legCarv,-locX,yL,locZ,0,ang,0);
        addMesh('Legs',gL,legHex,legCarv,locX,yL,locZ,0,-ang,0);
      } else {
        const gL=buildOneLeg();
        addMesh('Legs',gL,legHex,legCarv,-locX,yL,-locZ);
        addMesh('Legs',gL,legHex,legCarv,locX,yL,-locZ);
        addMesh('Legs',gL,legHex,legCarv,-locX,yL,locZ);
        addMesh('Legs',gL,legHex,legCarv,locX,yL,locZ);
      }

      if (!['hairpin','saber'].includes(legShape)) {
        const apH=Math.min(0.055,dSeat.h*0.7),apY=seatTopY-apH/2;
        const apW=dSeat.w-dLeg.w*2.2,apD=dSeat.d-dLeg.d*2.2;
        if(apW>0.01){addMesh('Legs',new THREE.BoxGeometry(apW,apH,dLeg.d*0.9),legHex,'none',0,apY,locZ);addMesh('Legs',new THREE.BoxGeometry(apW,apH,dLeg.d*0.9),legHex,'none',0,apY,-locZ);}
        if(apD>0.01){addMesh('Legs',new THREE.BoxGeometry(dLeg.w*0.9,apH,apD),legHex,'none',-locX,apY,0);addMesh('Legs',new THREE.BoxGeometry(dLeg.w*0.9,apH,apD),legHex,'none',locX,apY,0);}
      }

      const sH = seatShape==='padded_seat' ? dSeat.h*2.2 : dSeat.h;
      const seatY = seatShape==='padded_seat' ? seatTopY+dSeat.h*0.6 : yS;
      const makeSeatTopShape = (taper_front_ratio, taper_back_ratio) => {
        const tfr=taper_front_ratio!==undefined?taper_front_ratio:1.0;
        const tbr=taper_back_ratio!==undefined?taper_back_ratio:1.0;
        const s=new THREE.Shape();
        s.moveTo(-dSeat.w/2*tbr,-dSeat.d/2);s.lineTo(dSeat.w/2*tbr,-dSeat.d/2);
        s.lineTo(dSeat.w/2*tfr,dSeat.d/2);s.lineTo(-dSeat.w/2*tfr,dSeat.d/2);s.closePath();
        return s;
      };

      if (seatShape === 'round_plank') {
        const geo=sg(()=>{const s=new THREE.Shape();s.absarc(0,0,dSeat.w/2,0,Math.PI*2,false);punchSeatHoles(s,seatHole,dSeat);const g=new THREE.ExtrudeGeometry(s,{depth:sH,bevelEnabled:false});g.translate(0,0,-sH/2);g.rotateX(Math.PI/2);return g;},new THREE.CylinderGeometry(dSeat.w/2,dSeat.w/2,sH,36));
        addMesh('Seat',geo,seatHex,seatCarv,0,seatY,0);
      } else if (seatShape === 'hex_plank') {
        const geo=sg(()=>{const s=new THREE.Shape();const r=dSeat.w/2;for(let i=0;i<6;i++){const a=(Math.PI/3)*i+Math.PI/6;i===0?s.moveTo(Math.cos(a)*r,Math.sin(a)*r):s.lineTo(Math.cos(a)*r,Math.sin(a)*r);}s.closePath();punchSeatHoles(s,seatHole,dSeat);const g=new THREE.ExtrudeGeometry(s,{depth:sH,bevelEnabled:false});g.translate(0,0,-sH/2);g.rotateX(Math.PI/2);return g;},new THREE.CylinderGeometry(dSeat.w/2,dSeat.w/2,sH,6));
        addMesh('Seat',geo,seatHex,seatCarv,0,seatY,0);
      } else if (seatShape === 'oct_plank') {
        const geo=sg(()=>{const s=new THREE.Shape();const r=dSeat.w/2;for(let i=0;i<8;i++){const a=(Math.PI/4)*i+Math.PI/8;i===0?s.moveTo(Math.cos(a)*r,Math.sin(a)*r):s.lineTo(Math.cos(a)*r,Math.sin(a)*r);}s.closePath();punchSeatHoles(s,seatHole,dSeat);const g=new THREE.ExtrudeGeometry(s,{depth:sH,bevelEnabled:false});g.translate(0,0,-sH/2);g.rotateX(Math.PI/2);return g;},new THREE.CylinderGeometry(dSeat.w/2,dSeat.w/2,sH,8));
        addMesh('Seat',geo,seatHex,seatCarv,0,seatY,0);
      } else if (seatShape === 'tapered_front' || seatShape === 'tapered_back') {
        const geo=sg(()=>{const tF=seatShape==='tapered_front'?0.68:1.0;const tB=seatShape==='tapered_back'?0.68:1.0;const s=makeSeatTopShape(tF,tB);punchSeatHoles(s,seatHole,dSeat);const g=new THREE.ExtrudeGeometry(s,{depth:sH,bevelEnabled:false});g.translate(0,0,-sH/2);g.rotateX(Math.PI/2);return g;},new THREE.BoxGeometry(dSeat.w,sH,dSeat.d));
        addMesh('Seat',geo,seatHex,seatCarv,0,seatY,0);
      } else if (seatShape === 'curved_plank') {
        const segsX=32,segsZ=32;
        const geo=sg(()=>{const planeGeo=new THREE.PlaneGeometry(dSeat.w,dSeat.d,segsX,segsZ);planeGeo.rotateX(-Math.PI/2);const pos=planeGeo.attributes.position;const dipAmount=sH*0.9;for(let i=0;i<pos.count;i++){const zVal=pos.getZ(i);const t=zVal/(dSeat.d/2);const yOff=dipAmount*(1-t*t);pos.setY(i,seatTopY-yOff);}planeGeo.computeVertexNormals();return planeGeo;},new THREE.PlaneGeometry(dSeat.w,dSeat.d));
        const topMesh=new THREE.Mesh(geo,getMat(seatHex,seatCarv));topMesh.name='Seat';topMesh.castShadow=true;topMesh.receiveShadow=true;currentGroup.add(topMesh);
        addMesh('Seat',new THREE.BoxGeometry(dSeat.w,sH*0.5,dSeat.d),seatHex,seatCarv,0,seatTopY-sH*0.6,0);
        addCurvedSeatHoles(seatHole,dSeat,seatTopY,seatHex,SCALE);
      } else if (seatShape === 'sculpted_saddle') {
        const segsX=32,segsZ=32;
        const geo=sg(()=>{const planeGeo=new THREE.PlaneGeometry(dSeat.w,dSeat.d,segsX,segsZ);planeGeo.rotateX(-Math.PI/2);const pos=planeGeo.attributes.position;const dipFB=sH*1.6;const riseW=sH*0.55;for(let i=0;i<pos.count;i++){const xVal=pos.getX(i);const zVal=pos.getZ(i);const tZ=zVal/(dSeat.d/2);const tX=xVal/(dSeat.w/2);const yDipFB=dipFB*(1-tZ*tZ);const yRiseW=riseW*(tX*tX);pos.setY(i,seatTopY-yDipFB+yRiseW);}planeGeo.computeVertexNormals();return planeGeo;},new THREE.PlaneGeometry(dSeat.w,dSeat.d));
        const topMesh=new THREE.Mesh(geo,getMat(seatHex,seatCarv));topMesh.name='Seat';topMesh.castShadow=true;topMesh.receiveShadow=true;currentGroup.add(topMesh);
        addMesh('Seat',new THREE.BoxGeometry(dSeat.w,sH*0.5,dSeat.d),seatHex,seatCarv,0,seatTopY-sH*0.6,0);
        addCurvedSeatHoles(seatHole,dSeat,seatTopY,seatHex,SCALE);
      } else {
        const geo=sg(()=>{const s=makeSeatTopShape(1.0,1.0);punchSeatHoles(s,seatHole,dSeat);const bvl=seatShape==='padded_seat';const g=new THREE.ExtrudeGeometry(s,{depth:sH,bevelEnabled:bvl,bevelSize:bvl?0.014:0,bevelThickness:0.014,bevelSegments:2});g.translate(0,0,-sH/2);g.rotateX(Math.PI/2);return g;},new THREE.BoxGeometry(dSeat.w,sH,dSeat.d));
        addMesh('Seat',geo,seatHex,seatCarv,0,seatY,0);
      }

      const bpW=Math.max(dLeg.w*0.95,0.04),bpH=dBack.h+dSeat.h*0.5;
      const bpY=seatTopY+bpH/2-dSeat.h*0.5;
      const needPosts=!['spindle_back','slat_back','ladder_back','cross_back'].includes(backShape);
      if(needPosts){
        addMesh('Back',new THREE.BoxGeometry(bpW,bpH,bpW),backHex,'none',-(dBack.w/2-bpW/2),bpY,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,bpH,bpW),backHex,'none',(dBack.w/2-bpW/2),bpY,backZ);
      }

      const punchBackHoles = (s) => {
        if(backHole==='none')return;
        const bw=dBack.w*0.12,bh=dBack.h*0.11,safeW=dBack.w*0.38,safeH=dBack.h*0.38;
        if(backHole==='center_slot'){const hw=Math.min(bw,safeW*0.3),hh=Math.min(bh*2.2,safeH);const h=new THREE.Path();h.moveTo(-hw,-hh);h.lineTo(hw,-hh);h.lineTo(hw,hh);h.lineTo(-hw,hh);h.closePath();s.holes.push(h);}
        else if(backHole==='handle_cutout'){const h=new THREE.Path();h.absellipse(0,dBack.h*0.2,Math.min(bw*1.6,safeW),Math.min(bh*0.5,safeH*0.25),0,Math.PI*2,true,0);s.holes.push(h);}
        else if(backHole==='grid_holes'){const gw=Math.min(bw*0.7,safeW*0.25),gh=Math.min(bh*0.7,safeH*0.25),stepX=dBack.w*0.28,stepY=dBack.h*0.28;for(let xi=-1;xi<=1;xi++)for(let yi=-1;yi<=1;yi++){const hx=xi*stepX,hy=yi*stepY;const h=new THREE.Path();h.moveTo(hx-gw,hy-gh);h.lineTo(hx+gw,hy-gh);h.lineTo(hx+gw,hy+gh);h.lineTo(hx-gw,hy+gh);h.closePath();s.holes.push(h);}}
        else if(backHole==='keyhole'){const kw=Math.min(bw*0.55,safeW*0.25),kh=Math.min(bh*1.65,safeH*0.7),kr=Math.min(bw*0.9,safeW*0.35);const h=new THREE.Path();h.moveTo(-kw,-kh);h.lineTo(-kw,kh*0.4);h.absarc(0,kh*0.4+kr,kr,Math.PI,0,true);h.lineTo(kw,-kh);h.closePath();s.holes.push(h);}
        else if(backHole==='horizontal_slots'){const hw=Math.min(bw*2.3,safeW),hh=Math.min(bh*0.4,safeH*0.15),stepY=dBack.h*0.26;[-1,0,1].forEach(i=>{const hy=i*stepY;const h=new THREE.Path();h.moveTo(-hw,hy-hh);h.lineTo(hw,hy-hh);h.lineTo(hw,hy+hh);h.lineTo(-hw,hy+hh);h.closePath();s.holes.push(h);});}
        else if(backHole==='heart_cutout'){const scl=Math.min(safeW/(bw*1.8),safeH/(bh*2.8),1.0),sw_=bw*scl,sh_=bh*scl,cx=0,cy=sh_*0.8;const h=new THREE.Path();h.moveTo(cx,cy+sh_*0.4);h.bezierCurveTo(-sw_*0.1,cy+sh_*1.2,-sw_*1.8,cy+sh_*1.2,-sw_*1.8,cy);h.bezierCurveTo(-sw_*1.8,cy-sh_*1.0,cx,cy-sh_*2.0,cx,cy-sh_*2.4);h.bezierCurveTo(cx,cy-sh_*2.0,sw_*1.8,cy-sh_*1.0,sw_*1.8,cy);h.bezierCurveTo(sw_*1.8,cy+sh_*1.2,sw_*0.1,cy+sh_*1.2,cx,cy+sh_*0.4);h.closePath();s.holes.push(h);}
        else if(backHole==='three_slots'){const sw_=Math.min(bw*0.38,safeW*0.12),sh_=Math.min(bh*2.2,safeH*0.8),stepX=dBack.w*0.26;[-1,0,1].forEach(i=>{const hx=i*stepX;const h=new THREE.Path();h.moveTo(hx-sw_,-sh_);h.lineTo(hx+sw_,-sh_);h.lineTo(hx+sw_,sh_);h.lineTo(hx-sw_,sh_);h.closePath();s.holes.push(h);});}
        else if(backHole==='diamond_cutout'){const r=Math.min(bw,bh,safeW*0.55,safeH*0.55)*2.2;const h=new THREE.Path();h.moveTo(0,r);h.lineTo(r,0);h.lineTo(0,-r);h.lineTo(-r,0);h.closePath();s.holes.push(h);}
        else if(backHole==='arch_window'){const aw=Math.min(bw*1.55,safeW*0.75),ab=-Math.min(bh*2.1,safeH*0.75),at=Math.min(bh*0.6,safeH*0.2);const h=new THREE.Path();h.moveTo(-aw,ab);h.lineTo(-aw,at);h.absarc(0,at,aw,Math.PI,0,true);h.lineTo(aw,ab);h.closePath();s.holes.push(h);}
      };

      const extrudeBack=(s,bvl=false)=>{const g=new THREE.ExtrudeGeometry(s,{depth:dBack.d,bevelEnabled:bvl,bevelSize:bvl?0.011:0,bevelThickness:0.011,bevelSegments:2});g.translate(0,0,-dBack.d/2);return g;};

      if(backShape==='round_back'){
        const geo=sg(()=>{const hw=dBack.w/2,hh=dBack.h/2;const s=new THREE.Shape();s.moveTo(-hw,-hh);s.lineTo(hw,-hh);s.quadraticCurveTo(hw*1.15,0,hw,hh);s.quadraticCurveTo(0,hh*1.1,-hw,hh);s.quadraticCurveTo(-hw*1.15,0,-hw,-hh);punchBackHoles(s);return extrudeBack(s,false);},new THREE.BoxGeometry(dBack.w,dBack.h,dBack.d));
        addMesh('Back',geo,backHex,backCarv,0,yB,backZ);
      } else if(backShape==='spindle_back'){
        const cnt=5,sR=dBack.w/(cnt*4.5),step=(dBack.w-bpW*2)/(cnt-1);
        addMesh('Back',new THREE.BoxGeometry(dBack.w+bpW,bpW,dBack.d*1.1),backHex,'none',0,yB+dBack.h/2-bpW/2,backZ);
        addMesh('Back',new THREE.BoxGeometry(dBack.w+bpW,bpW,dBack.d*1.1),backHex,'none',0,yB-dBack.h/2+bpW/2,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',-(dBack.w/2-bpW/2),yB,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',(dBack.w/2-bpW/2),yB,backZ);
        for(let i=0;i<cnt;i++) addMesh('Back',new THREE.CylinderGeometry(sR,sR*1.2,dBack.h*0.82,14),backHex,'none',-dBack.w/2+bpW+i*step,yB,backZ);
      } else if(backShape==='slat_back'){
        const cnt=4,totalW=dBack.w-bpW*2,slatW=totalW/(cnt*2-1),step=slatW*2;
        addMesh('Back',new THREE.BoxGeometry(dBack.w+bpW,bpW,dBack.d*1.1),backHex,'none',0,yB+dBack.h/2-bpW/2,backZ);
        addMesh('Back',new THREE.BoxGeometry(dBack.w+bpW,bpW,dBack.d*1.1),backHex,'none',0,yB-dBack.h/2+bpW/2,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',-(dBack.w/2-bpW/2),yB,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',(dBack.w/2-bpW/2),yB,backZ);
        for(let i=0;i<cnt;i++) addMesh('Back',new THREE.BoxGeometry(slatW,dBack.h*0.82,dBack.d*0.85),backHex,'none',-totalW/2+i*step+slatW/2,yB,backZ);
      } else if(backShape==='ladder_back'){
        const cnt=4,step=dBack.h/(cnt-1);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h*1.05,bpW),backHex,'none',-(dBack.w/2-bpW/2),yB,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h*1.05,bpW),backHex,'none',(dBack.w/2-bpW/2),yB,backZ);
        for(let i=0;i<cnt;i++) addMesh('Back',new THREE.BoxGeometry(dBack.w,bpW*0.85,dBack.d),backHex,'none',0,yB-dBack.h/2+i*step,backZ);
      } else if(backShape==='cross_back'){
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',-(dBack.w/2-bpW/2),yB,backZ);
        addMesh('Back',new THREE.BoxGeometry(bpW,dBack.h,bpW),backHex,'none',(dBack.w/2-bpW/2),yB,backZ);
        addMesh('Back',new THREE.BoxGeometry(dBack.w+bpW,bpW,dBack.d*1.1),backHex,'none',0,yB+dBack.h/2-bpW/2,backZ);
        const dLen=Math.sqrt(dBack.w*dBack.w+dBack.h*dBack.h)*0.96,dAng=Math.atan2(dBack.h,dBack.w);
        const dGeo=new THREE.BoxGeometry(dLen,bpW*0.85,dBack.d);
        addMesh('Back',dGeo,backHex,'none',0,yB,backZ,0,0,dAng);
        addMesh('Back',dGeo,backHex,'none',0,yB,backZ,0,0,-dAng);
      } else if(backShape==='balloon_back'){
        const geo=sg(()=>{const hw=dBack.w/2,hh=dBack.h/2;const s=new THREE.Shape();s.moveTo(-hw*0.25,-hh);s.lineTo(hw*0.25,-hh);s.quadraticCurveTo(hw*0.55,-hh*0.5,hw*0.42,hh*0.5);s.quadraticCurveTo(hw*0.2,hh*0.75,0,hh*0.78);s.quadraticCurveTo(-hw*0.2,hh*0.75,-hw*0.42,hh*0.5);s.quadraticCurveTo(-hw*0.55,-hh*0.5,-hw*0.25,-hh);punchBackHoles(s);return extrudeBack(s,true);},new THREE.BoxGeometry(dBack.w,dBack.h,dBack.d));
        addMesh('Back',geo,backHex,backCarv,0,yB,backZ);
      } else if(backShape==='shield_back'){
        const geo=sg(()=>{const hw=dBack.w/2,hh=dBack.h/2;const s=new THREE.Shape();s.moveTo(0,-hh);s.quadraticCurveTo(hw*0.55,-hh*0.2,hw,hh*0.1);s.quadraticCurveTo(hw,hh*0.55,0,hh);s.quadraticCurveTo(-hw,hh*0.55,-hw,hh*0.1);s.quadraticCurveTo(-hw*0.55,-hh*0.2,0,-hh);punchBackHoles(s);return extrudeBack(s,true);},new THREE.BoxGeometry(dBack.w,dBack.h,dBack.d));
        addMesh('Back',geo,backHex,backCarv,0,yB,backZ);
      } else if(backShape==='wingback'){
        const geo=sg(()=>{const hw=dBack.w/2,hh=dBack.h/2;const s=new THREE.Shape();s.moveTo(-hw,-hh);s.lineTo(hw,-hh);s.lineTo(hw,hh*0.35);s.quadraticCurveTo(hw*1.0,hh*0.6,hw*0.85,hh*0.75);s.quadraticCurveTo(hw*0.7,hh*0.9,hw*0.4,hh);s.quadraticCurveTo(0,hh*1.05,-hw*0.4,hh);s.quadraticCurveTo(-hw*0.7,hh*0.9,-hw*0.85,hh*0.75);s.quadraticCurveTo(-hw*1.0,hh*0.6,-hw,hh*0.35);s.lineTo(-hw,-hh);punchBackHoles(s);return extrudeBack(s,true);},new THREE.BoxGeometry(dBack.w,dBack.h,dBack.d));
        addMesh('Back',geo,backHex,backCarv,0,yB,backZ);
      } else {
        const geo=sg(()=>{const hw=dBack.w/2,hh=dBack.h/2;const s=new THREE.Shape();s.moveTo(-hw,-hh);s.lineTo(hw,-hh);s.lineTo(hw,hh);s.lineTo(-hw,hh);s.closePath();punchBackHoles(s);const bvl=backShape==='padded_back';const g=new THREE.ExtrudeGeometry(s,{depth:dBack.d,bevelEnabled:bvl,bevelSize:bvl?0.014:0,bevelThickness:0.014,bevelSegments:2});g.translate(0,0,-dBack.d/2);return g;},new THREE.BoxGeometry(dBack.w,dBack.h,dBack.d));
        addMesh('Back',geo,backHex,backCarv,0,yB,backZ);
      }
    }

    function buildArmrests(getDims, itemShapes, itemCarvings, itemSelections, addMesh, sg, seatTopY, yB, backZ, dSeat, dLeg, dBack, isRocking, activeItem) {
      const armShape = itemShapes['Armrests'] || (isRocking ? 'rocking_arm' : 'l_shape_arm');
      const armCarv  = itemCarvings['Armrests']   || 'none';
      const armHex   = itemSelections['Armrests'] || '#8B4513';
      const dArm     = getDims('Armrests');
      const bW=Math.max(dArm.w,0.04), pH=Math.max(dArm.h,0.05), th=Math.max(dArm.d,0.04);
      const armXL=-(dSeat.w/2)+bW/2, armXR=(dSeat.w/2)-bW/2;
      const postZ = isRocking ? dSeat.d*0.30 : (dSeat.d/2*1.0 - dLeg.d*0.4);
      const barLen = isRocking ? dSeat.d*0.78 : dSeat.d*0.80;
      const barCtrZ = postZ - barLen/2 + th;
      const armTopY = seatTopY + pH;

      const makeArm = (isLeft) => {
        const xPos=isLeft?armXL:armXR;
        const ac=(armShape==='pad_arm'&&armCarv==='none')?'padded':armCarv;

        if (armShape === 'rocking_arm') {
          addMesh('Armrests', new THREE.BoxGeometry(bW*1.1, th*1.4, barLen*0.88), armHex, ac, xPos, seatTopY+pH*0.85, barCtrZ+barLen*0.04);
          addMesh('Armrests', new THREE.CylinderGeometry(bW*0.42, bW*0.42, pH, 10), armHex, ac, xPos, seatTopY+pH/2, postZ);
        } else if(armShape==='l_shape_arm'){
          addMesh('Armrests',new THREE.BoxGeometry(bW,pH,th),armHex,ac,xPos,seatTopY+pH/2,postZ);
          addMesh('Armrests',new THREE.BoxGeometry(bW,th,barLen),armHex,ac,xPos,armTopY,barCtrZ);
        } else if(armShape==='sloped_arm'){
          const rise=pH*0.5,run=barLen,len=Math.sqrt(rise*rise+run*run),ang=Math.atan2(rise,run);
          addMesh('Armrests',new THREE.BoxGeometry(bW,th,len),armHex,ac,xPos,seatTopY+rise/2,postZ-run/2,ang,0,0);
        } else if(armShape==='floating_bar'){
          addMesh('Armrests',new THREE.CylinderGeometry(th*0.28,th*0.28,pH*0.7,8),armHex,ac,xPos,seatTopY+pH*0.35,postZ);
          addMesh('Armrests',new THREE.BoxGeometry(bW*1.15,th,barLen*0.72),armHex,ac,xPos,armTopY*0.97,barCtrZ+barLen*0.05);
        } else if(armShape==='curved_s_arm'||armShape==='scroll_arm'){
          const geo=sg(()=>new THREE.TubeGeometry(new SArmCurve(xPos,seatTopY,postZ,pH,barLen),24,th,8,false),new THREE.BoxGeometry(bW,th,barLen));
          if(geo.type==='BoxGeometry') addMesh('Armrests',geo,armHex,ac,xPos,armTopY,barCtrZ);
          else addMesh('Armrests',geo,armHex,ac,0,0,0);
          if(armShape==='scroll_arm') addMesh('Armrests',new THREE.TorusGeometry(th*1.9,th*0.65,8,16,Math.PI*1.2),armHex,ac,xPos,armTopY-th*1.1,postZ-barLen+th*2,Math.PI/2,0,0);
        } else if(armShape==='track_arm'){
          addMesh('Armrests',new THREE.BoxGeometry(bW,pH,barLen),armHex,ac,xPos,seatTopY+pH/2,barCtrZ);
        } else if(armShape==='swoop_arm'){
          const geo=sg(()=>new THREE.TubeGeometry(new SwoopCurve(xPos,seatTopY,postZ,barLen,yB,dBack.h),24,th,8,false),new THREE.BoxGeometry(bW,th,barLen));
          if(geo.type==='BoxGeometry') addMesh('Armrests',geo,armHex,ac,xPos,seatTopY+pH*0.3,barCtrZ);
          else addMesh('Armrests',geo,armHex,ac,0,0,0);
        } else if(armShape==='pad_arm'){
          addMesh('Armrests',new THREE.BoxGeometry(bW,pH*0.55,th),armHex,ac,xPos,seatTopY+pH*0.275,postZ);
          addMesh('Armrests',new THREE.BoxGeometry(bW*1.6,th*1.9,barLen*0.68),armHex,'padded',xPos,armTopY*0.97,barCtrZ+barLen*0.07);
        }
      };

      if(activeItem.isLeftArmVisible)  makeArm(true);
      if(activeItem.isRightArmVisible) makeArm(false);
    }

    function exportModel() {
      if (!currentGroup) return;
      const exporter = new THREE.STLExporter();
      const originalRot = currentGroup.rotation.y; currentGroup.rotation.y = 0;
      const result = exporter.parse(currentGroup, { binary: true });
      currentGroup.rotation.y = originalRot;
      const blob = new Blob([result], { type: 'application/octet-stream' });
      const link = document.createElement('a');
      const activeItem = getActiveItem();
      const safeName = activeItem ? activeItem.name.replace(/\s+/g,'_') : 'Chair_Model';
      link.href = URL.createObjectURL(blob); link.download = safeName + '_Model.stl';
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
  </script>
