<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FurniCraft CAD - Dining Chair Designer Pro</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/exporters/STLExporter.js"></script>

  <style>
    :root {
      --bg-dark: #1e1e1e; --bg-panel: #252526; --bg-header: #333333;
      --accent: #d35400; --select-blue: #007acc; --text-main: #e0e0e0;
      --text-dim: #999; --border: #3e3e42; --gold: #f1c40f; --rec-bg: #2c2918;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    header { height: 45px; background-color: var(--bg-header); display: flex; align-items: center; padding: 0 1rem; border-bottom: 1px solid var(--border); justify-content: space-between; }
    .brand { font-weight: 600; color: white; display: flex; align-items: center; gap: 8px; }
    .btn-export { background: #e67e22 !important; color: white !important; padding: 5px 12px; border-radius: 4px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 6px; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-export:hover { background: #d35400 !important; }
    .workspace { display: flex; flex: 1; height: calc(100vh - 45px); }
    .panel-left { width: 280px; background-color: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; }
    .panel-header { padding: 14px 16px; font-size: 0.82rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #e0e0e0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #2a2a2e 0%, #252526 100%); }
    .scene-list { flex: 1; overflow-y: auto; padding: 8px; }
    .scene-item { padding: 13px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 0.95rem; }
    .scene-item:hover { background-color: #333; }
    .scene-item.active { background-color: #37373d; border-left: 3px solid var(--accent); padding-left: 10px; }
    .btn-delete { background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; padding: 4px 6px; border-radius: 4px; }
    .btn-delete:hover { color: #c0392b; background: rgba(192,57,43,0.1); }
    .btn-add { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.02em; transition: 0.2s; }
    .btn-add:hover { background: #b84a00; }
    .viewport { flex: 1; position: relative; background: radial-gradient(circle at center, #2d2d30 0%, #1e1e1e 100%); }
    #canvas-container { width: 100%; height: 100%; outline: none; }
    .viewport-controls { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 5px; border-radius: 20px; border: 1px solid #555; display: flex; gap: 5px; z-index: 10; }
    .vp-btn { background: transparent; border: none; color: #ddd; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
    .vp-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .vp-btn.active { color: var(--accent); }

    .modal-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .design-modal-overlay.open { display: flex; }
    .design-modal { background: #252526; border: 1px solid var(--border); padding: 20px; border-radius: 8px; width: 600px; max-height: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; display:flex; flex-direction:column; }
    .btn-close-modal { position: absolute; top:10px; right:15px; background:none; border:none; color:#aaa; font-size:1.5rem; cursor:pointer; z-index:2; }
    .btn-close-modal:hover { color:white; }
    .modal-title { font-size: 1.1rem; color: white; margin-bottom: 15px; font-weight: 600; flex-shrink:0; }
    .modal-scroll-area { flex: 1; overflow-y: auto; padding-right: 10px; }
    .modal-section-title { width: 100%; color: var(--select-blue); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin: 15px 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
    .modal-section-title:first-child { margin-top: 0; }
    .design-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
    .design-card { background: #333; border: 1px solid #444; border-radius: 4px; padding: 10px; text-align: center; cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; height: 80px; position: relative; overflow: hidden; }
    .design-card:hover { transform: translateY(-2px); background: #3e3e42; border-color:white; }
    .design-card.active { border-color: var(--accent); background: rgba(211, 84, 0, 0.1); }
    .design-icon { font-size: 1.4rem; color: #aaa; }
    .design-name { font-size: 0.7rem; color: #ccc; line-height: 1.1; }

    .design-card.render-partial { border-color: #8a6800; background: #1e1a00; }
    .design-card.render-partial:hover { border-color: #f1c40f; background: #2a2300; }
    .design-card.render-partial .design-icon { color: #888; }
    .design-card.render-partial .design-name { color: #999; }
    .design-card.render-broken { border-color: #7a1111 !important; background: #1a0000 !important; cursor: not-allowed !important; pointer-events: none; opacity: 0.72; }
    .design-card.render-broken:hover { transform: none !important; }
    .design-card.render-broken .design-icon { color: #5a2a2a; }
    .design-card.render-broken .design-name { color: #6a4040; }
    .render-badge { position: absolute; top: 4px; right: 4px; font-size: 0.52rem; font-weight: 800; letter-spacing: 0.04em; padding: 2px 5px; border-radius: 3px; line-height: 1.4; pointer-events: none; text-transform: uppercase; }
    .render-badge.badge-warn { background: rgba(241,196,15,0.18); color: #f1c40f; border: 1px solid rgba(241,196,15,0.35); }
    .render-badge.badge-broken { background: rgba(192,57,43,0.22); color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }
    .render-broken-overlay { position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 6px, rgba(180,20,20,0.08) 6px, rgba(180,20,20,0.08) 12px); pointer-events: none; border-radius: 4px; }
    .render-legend { display: flex; gap: 14px; align-items: center; padding: 8px 12px; background: #1c1c1e; border: 1px solid #333; border-radius: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .render-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #999; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-dot.ok   { background: #2ecc71; border: 1px solid #27ae60; }
    .legend-dot.warn { background: #f1c40f; border: 1px solid #d4ac0d; }
    .legend-dot.bad  { background: #e74c3c; border: 1px solid #c0392b; }

    .score-card { position: absolute; top: 60px; right: 10px; background: rgba(18, 18, 20, 0.92); backdrop-filter: blur(6px); padding: 18px 20px; border-radius: 10px; width: 260px; border: 1px solid #444; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .score-title { font-size: 0.82rem; font-weight: 800; color: #e8e8e8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; align-items: center; gap: 6px; justify-content: flex-start; }
    .score-info-btn { width: 17px; height: 17px; border-radius: 50%; background: #2e2e2e; border: 1px solid #4a4a4a; color: #777; font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.18s; pointer-events: auto; flex-shrink: 0; margin-left: 4px; }
    .score-info-btn:hover { background: var(--select-blue); border-color: var(--select-blue); color: white; transform: scale(1.2); }
    .score-metric-label { font-size: 0.85rem; color: #ccc; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .score-metric-label span:last-child { font-size: 0.95rem; font-weight: 700; color: white; }
    .score-bar-bg { width: 100%; height: 7px; background: #333; margin-bottom: 14px; border-radius: 4px; overflow: hidden; }
    .score-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; }
    #rec-status { margin-top: 6px; font-size: 0.82rem; color: #aaa; display: flex; align-items: center; gap: 6px; padding-top: 8px; border-top: 1px solid #333; }

    .panel-right { width: 560px; background-color: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; }
    .prop-scroll { flex: 1; overflow-y: auto; }
    .prop-group { padding: 20px 18px; border-bottom: 1px solid var(--border); }

    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; min-width: 0; }
    .section-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; flex-shrink: 0; background: rgba(211,84,0,0.15); color: var(--accent); border: 1px solid rgba(211,84,0,0.25); }
    .prop-label { font-size: 0.78rem; font-weight: 800; color: #d0d0d0; display: inline; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; line-height: 1.2; flex-shrink: 0; }

    .info-btn { width: 18px; height: 18px; border-radius: 50%; background: #2e2e2e; border: 1px solid #4a4a4a; color: #777; font-size: 0.65rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; }
    .info-btn:hover { background: var(--select-blue); border-color: var(--select-blue); color: white; transform: scale(1.2); box-shadow: 0 0 8px rgba(0,122,204,0.45); }

    .info-tooltip { position: fixed; z-index: 9999; background: #1a1a1e; border: 1px solid var(--select-blue); border-radius: 10px; padding: 16px 18px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,122,204,0.15); pointer-events: none; opacity: 0; transform: translateY(6px) scale(0.97); transition: opacity 0.18s ease, transform 0.18s ease; }
    .info-tooltip.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .info-tooltip-title { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--select-blue); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
    .info-tooltip-title i { font-size: 0.85rem; }
    .info-tooltip-body { font-size: 0.88rem; color: #c0c0c0; line-height: 1.6; }
    .info-tooltip-tip { margin-top: 10px; padding-top: 10px; border-top: 1px solid #2d2d33; font-size: 0.8rem; color: #f1c40f; display: flex; align-items: flex-start; gap: 6px; }
    .info-tooltip-tip i { margin-top: 2px; flex-shrink: 0; }
    input[type="text"], select { width: 100%; background: #3c3c3c; border: 1px solid var(--border); color: white; padding: 11px 12px; border-radius: 4px; font-family: inherit; margin-bottom: 5px; font-size: 1.05rem; }
    .range-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 1rem; }
    .range-row label { width: 55px; color: #aaa; font-size: 0.95rem; }
    input[type="range"] { flex: 1; accent-color: var(--accent); height: 6px; }
    .val-display { width: 48px; text-align: right; color: var(--accent); font-size: 1rem; font-weight: 600; }
    .mat-section-title { color: var(--gold); font-size: 1rem; font-weight: bold; margin: 0 0 10px 0; display: flex; align-items: center; gap: 6px; }
    .mat-grid-large { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .mat-card-lg { background: #333; border: 1px solid var(--border); border-radius: 6px; padding: 12px 8px; text-align: center; cursor: pointer; transition: 0.15s; position: relative; }
    .mat-card-lg:hover { transform: translateY(-2px); background: #3e3e42; border-color: white; }
    .mat-card-lg.recommended { background: var(--rec-bg); border-color: #554a1f; }
    .mat-card-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .mat-card-name { font-size: 0.88rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .armrest-row { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 1rem; flex-wrap: wrap; }
    .armrest-label { color: #888; font-size: 0.95rem; }
    .toggle-btn { padding: 8px 16px; font-size: 0.95rem; background: #333; border: 1px solid #444; border-radius: 15px; cursor: pointer; color: #ccc; transition: 0.15s; }
    .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    .layer-item { background: #2b2b2b; border-radius: 6px; margin-bottom: 10px; border: 1px solid #333; transition: all 0.2s; }
    .layer-item.active-layer { border: 1px solid var(--select-blue); box-shadow: 0 0 10px rgba(0, 122, 204, 0.25); }
    .layer-header { padding: 13px 12px; font-size: 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: #333; border-radius: 6px 6px 0 0; }
    .layer-header:hover { background: #3c3c3c; }
    .color-preview { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #777; flex-shrink: 0; }
    .layer-content { display: none; padding: 16px; background: #222; border-top: 1px solid #444; border-radius: 0 0 6px 6px; }
    .layer-item.open .layer-content { display: block; }
    .part-control-row { margin-bottom: 16px; }
    .part-control-label { font-size: 0.72rem; font-weight: 700; color: #888; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .part-control-label .lbl-info-btn { width: 15px; height: 15px; border-radius: 50%; background: #2a2a2a; border: 1px solid #484848; color: #666; font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; margin-left: 2px; }
    .part-control-label .lbl-info-btn:hover { background: var(--select-blue); border-color: var(--select-blue); color: white; transform: scale(1.2); }
    .clickable-design-val { font-size: 1rem; color: var(--text-dim); padding: 10px 12px; background: #111; border-radius: 4px; border: 1px solid #444; cursor: pointer; transition: 0.1s; display: inline-flex; align-items: center; gap: 5px; width: 100%; justify-content: space-between; }
    .clickable-design-val:hover { background: #000; border-color: var(--select-blue); color: white; }
    .clickable-design-val i { color: #666; font-size: 0.9rem; }
    .hex-wrapper { display: flex; align-items: center; gap: 10px; }
    input[type="color"] { -webkit-appearance: none; border: none; width: 44px; height: 44px; cursor: pointer; background: none; padding: 0; border-radius: 4px; }
    .hex-text-input { width: 110px !important; margin: 0 !important; font-family: monospace; text-transform: uppercase; font-size: 1rem; }
    .dim-row { display: flex; gap: 8px; margin-top: 6px; }
    .dim-group { flex: 1; }
    .dim-input { width: 100%; background: #111; border: 1px solid #444; color: var(--accent); padding: 10px; text-align: center; font-size: 1.05rem; border-radius: 3px; }
    .dim-label { font-size: 0.82rem; color: #666; text-align: center; margin-top: 5px; }
    .footer-bar { padding: 18px 20px; background: #202020; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-bar span { font-size: 0.88rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .total-price { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
    .instruction-text { font-size: 0.88rem; color: var(--select-blue); margin-bottom: 12px; font-style: italic; }
    .view-focus-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; margin-left: auto; margin-right: 10px; }
    .view-focus-btn:hover { color: var(--select-blue); }

    /* ── Previous project bar ── */
    .prev-project-bar { margin:8px 8px 0; background:#1a1a1c; border:1px solid #2e2e32; border-radius:8px; overflow:hidden; }
    .prev-project-label { padding:6px 10px 4px; font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; color:#555; }
    .prev-project-item { padding:10px 12px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:0.15s; }
    .prev-project-item:hover { background:#222; }
    .prev-project-name { font-size:0.82rem; color:#aaa; display:flex; align-items:center; gap:7px; }
    .prev-project-name i { color:#555; font-size:0.75rem; }
    .prev-project-link { font-size:0.7rem; color:#555; display:flex; align-items:center; gap:4px; }
    .prev-project-link:hover { color:var(--select-blue); }
    .prev-project-divider { height:1px; background:#2a2a2a; margin:0 10px; }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <i class="fas fa-chair"></i> FurniCraft Studio - Dining Chair Pro
    </div>
    <div class="header-controls">
      <button class="btn-export" onclick="goToExport()">
        <i class="fas fa-file-export"></i> Export
      </button>
    </div>
  </header>

  <div class="workspace">
    <aside class="panel-left">
      <div class="panel-header">
        <span><i class="fas fa-folder-open" style="color:var(--accent);margin-right:8px;"></i>Design Projects</span>
        <button class="info-btn" onclick="showTooltip(event,'left-panel-info')" title="About Design Projects"><i class="fas fa-info"></i></button>
      </div>
      <div class="scene-list" id="scene-list"></div>
      <div id="prev-project-bar" class="prev-project-bar" style="display:none">
        <div class="prev-project-label">Previous Project</div>
        <div class="prev-project-divider"></div>
        <div class="prev-project-item" onclick="goToPrevProject()">
          <span class="prev-project-name"><i class="fas fa-history"></i><span id="prev-project-name-text">—</span></span>
          <span class="prev-project-link"><i class="fas fa-external-link-alt"></i> Open</span>
        </div>
      </div>
      <button class="btn-add" onclick="goToCraft()">
        <i class="fas fa-plus"></i> Add New Furniture Design
      </button>
    </aside>

    <main class="viewport">
      <div class="viewport-controls">
        <button class="vp-btn" id="btn-rotate" onclick="toggleRotation()">
          <i class="fas fa-pause"></i> Stop Rotate
        </button>
        <button class="vp-btn" id="btn-dims" onclick="toggleDimensions()">
          <i class="fas fa-ruler-combined"></i> Hide Ruler
        </button>
        <button class="vp-btn" onclick="resetView()">
          <i class="fas fa-sync"></i> Full View
        </button>
      </div>

      <div id="canvas-container"></div>

      <div class="score-card">
        <div class="score-title">
          <span><i class="fas fa-chart-bar" style="color:var(--accent); margin-right:7px;"></i> Design Analysis</span>
          <button class="score-info-btn" onclick="showTooltip(event,'score-info')" title="About Design Analysis"><i class="fas fa-info"></i></button>
        </div>
        <div class="score-metric-label"><span>Durability</span><span id="score-dura-val">0%</span></div>
        <div class="score-bar-bg"><div id="bar-dura" class="score-bar-fill" style="width:0%"></div></div>
        <div class="score-metric-label"><span>Material Quality</span><span id="score-qual-val">0%</span></div>
        <div class="score-bar-bg"><div id="bar-qual" class="score-bar-fill" style="width:0%"></div></div>
        <div id="rec-status"></div>
      </div>

      <div id="design-modal-overlay" class="modal-overlay design-modal-overlay" onclick="closeDesignModal(event)">
        <div class="design-modal" onclick="event.stopPropagation()">
          <button class="btn-close-modal" onclick="closeDesignModal()">×</button>
          <div id="design-modal-title" class="modal-title">Select Design</div>
          <div id="design-modal-scroll" class="modal-scroll-area"></div>
        </div>
      </div>
    </main>

    <aside class="panel-right">
      <div class="panel-header">
        <span><i class="fas fa-sliders-h" style="color:var(--accent);margin-right:8px;"></i>Properties</span>
        <button class="info-btn" onclick="showTooltip(event,'right-panel-info')" title="About Properties Panel"><i class="fas fa-info"></i></button>
      </div>
      <div class="prop-scroll">
        <div class="prop-group">
          <div class="section-header">
            <div class="section-icon"><i class="fas fa-tag"></i></div>
            <label class="prop-label">Project Name</label>
            <button class="info-btn" onclick="showTooltip(event,'proj-name-info')"><i class="fas fa-info"></i></button>
          </div>
          <input type="text" id="project-name" placeholder="Project Name" oninput="updateProjectName(this.value)">
        </div>

        <div class="prop-group">
          <div class="section-header">
            <div class="section-icon"><i class="fas fa-expand-arrows-alt"></i></div>
            <label class="prop-label">Global Scale</label>
            <button class="info-btn" onclick="showTooltip(event,'scale-info')"><i class="fas fa-info"></i></button>
          </div>
          <div class="range-row"><label>Width</label><input type="range" id="inp-scale-x" min="50" max="200" value="100" oninput="updateGlobalScale('x', this.value)"><span class="val-display" id="gs-x">100</span></div>
          <div class="range-row"><label>Height</label><input type="range" id="inp-scale-y" min="50" max="200" value="100" oninput="updateGlobalScale('y', this.value)"><span class="val-display" id="gs-y">100</span></div>
          <div class="range-row"><label>Depth</label><input type="range" id="inp-scale-z" min="50" max="200" value="100" oninput="updateGlobalScale('z', this.value)"><span class="val-display" id="gs-z">100</span></div>
        </div>

    function goToExport() {
      // 1. Force a quick render to grab the cleanest image without UI lines
      const wasRotating = controls.autoRotate;
      const wereDimsShowing = showDimensions;
      if (wasRotating) controls.autoRotate = false;
      if (wereDimsShowing) { showDimensions = false; build3DScene(); }
      
      renderer.render(scene, camera); // Force a draw
      
      // 2. Capture the 3D Canvas as an Image
      const canvas = document.querySelector('#canvas-container canvas');
      const previewImageURL = canvas ? canvas.toDataURL("image/png") : "";

      // Restore UI state
      if (wasRotating) controls.autoRotate = true;
      if (wereDimsShowing) { showDimensions = true; build3DScene(); }
      
      // 3. Gather data from the active design
      const activeItem = getActiveItem();
      if (!activeItem) return;

      // Extract the calculated total price from the UI (removing the peso sign)
      const priceText = document.getElementById('total-price').innerText.replace(/[^0-9.-]+/g, "");
      const numericPrice = parseFloat(priceText) || 0;

      // Extract the calculated Analysis scores from the UI
      const durabilityText = document.getElementById('score-dura-val').innerText.replace('%', '');
      const qualityText = document.getElementById('score-qual-val').innerText.replace('%', '');

      // Build the formatted materials map based on the active selections
      const formattedMaterials = {};
      const selections = activeItem.selections || {};
      
      // Loop through the selected hex codes and map them to real material names
      Object.keys(selections).forEach(partName => {
        const hex = selections[partName];
        // Find the material in the database that matches this hex color
        const matKey = Object.keys(materialDB).find(k => materialDB[k].hex.toLowerCase() === hex.toLowerCase());
        formattedMaterials[partName] = matKey ? materialDB[matKey].name : 'Custom Material';
      });

      // 4. Construct the Universal Export Object
      const exportData = {
          exportId: 'EXP-' + Date.now().toString().slice(-6),
          projectName: activeItem.name || 'Custom Chair Design',
          furnitureType: 'Dining Chair Pro', // Change this in table.html/bed.html
          estimatedPriceText: '₱' + numericPrice.toLocaleString('en-US'),
          previewDataUrl: previewImageURL, 
          cadState: JSON.stringify({
              items: [{
                  id: activeItem.id,
                  globalScale: activeItem.globalScale || { x: 1, y: 1, z: 1 },
                  materials: formattedMaterials,
                  dims: activeItem.dims || {},
                  analysis: {
                      durability: parseInt(durabilityText) || 90,
                      quality: parseInt(qualityText) || 90
                  }
              }]
          })
      };

      // 5. Save to LocalStorage so export_area.html can read it
      const drafts = JSON.parse(localStorage.getItem('exportDrafts') || '[]');
      drafts.unshift(exportData);
      localStorage.setItem('exportDrafts', JSON.stringify(drafts));
      sessionStorage.setItem('currentExportId', exportData.exportId);

      // Save the builder state too, just in case
      saveState();

      // 6. Redirect
      window.location.href = 'export_area.html';
    }

    function showTooltip(event, key) {
      event.stopPropagation();
      const data = tooltipData[key]; if (!data) return;
      const tooltip = document.getElementById('info-tooltip');
      if (activeTooltip === key && tooltip.classList.contains('visible')) { hideTooltip(); return; }
      activeTooltip = key;
      document.getElementById('tt-title').innerHTML = '<i class="' + data.icon + '"></i>&nbsp;' + data.title;
      document.getElementById('tt-body').textContent = data.body;
      document.getElementById('tt-tip').innerHTML = '<i class="fas fa-lightbulb"></i> ' + data.tip;
      const btn = event.currentTarget, rect = btn.getBoundingClientRect();
      const tipW = 300, tipH = 200;
      let left = rect.left - tipW - 12, top = rect.top - 10;
      if (left < 8) left = rect.right + 12;
      if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
      if (top + tipH > window.innerHeight - 10) top = window.innerHeight - tipH - 10;
      if (top < 8) top = 8;
      tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
      tooltip.classList.add('visible');

    /* ==========================================================================
       GLOBAL CURVE CLASSES
       ========================================================================== */
    class LegCurve extends THREE.Curve {
      constructor(shapeType, w, h) { super(); this.shapeType = shapeType; this.w = w; this.h = h; }
      getPoint(t, opt) {
        const tx = this.shapeType === 'cabriole' ? Math.sin(t * Math.PI) * (this.w/2) : t * (this.w);
        return opt ? opt.set(tx, t*this.h - this.h/2, 0) : new THREE.Vector3(tx, t*this.h - this.h/2, 0);
      }
    }
    class HairpinCurve extends THREE.Curve {
      constructor(w, h) { super(); this.w = w; this.h = h; }
      getPoint(t, opt) {
        let tx = 0, ty = 0, tz = 0;
        if(t < 0.5) { ty = (1-t*2)*this.h; tx = t*this.w; } else { ty = (t-0.5)*2*this.h; tx = (1-t)*this.w; }
        return opt ? opt.set(tx, ty - this.h/2, tz) : new THREE.Vector3(tx, ty - this.h/2, tz);
      }
    }
    class SwoopCurve extends THREE.Curve {
      constructor(x, yS, pZ, barL, yB, dBackH) { super(); this.x=x; this.yS=yS; this.pZ=pZ; this.barL=barL; this.yB=yB; this.dBackH=dBackH; }
      getPoint(t, opt) {
        const pt = new THREE.Vector3(this.x, this.yS + Math.pow(t,2)*(this.yB-this.dBackH/4-this.yS), this.pZ - t*this.barL);
        return opt ? opt.copy(pt) : pt;
      }
    }
    class SArmCurve extends THREE.Curve {
      constructor(x, yS, pZ, pH, barL) { super(); this.x=x; this.yS=yS; this.pZ=pZ; this.pH=pH; this.barL=barL; }
      getPoint(t, opt) {
        const ty = Math.sin(Math.PI/2 * t) * this.pH;
        const tz = Math.cos(Math.PI/2 * t) * this.barL - this.barL;
        const pt = new THREE.Vector3(this.x, this.yS+ty, this.pZ+tz);
        return opt ? opt.copy(pt) : pt;
      }
    }

    let appState = { items: [], activeItemId: 0, activeLayer: null };
    let isRotating = true, showDimensions = true, textureCache = {}, modalState = { partName: null, type: null };

    window.onload = function() {
      try {
        let savedState = sessionStorage.getItem('cadState_chair_v6');
        if (savedState) { appState = JSON.parse(savedState); if (!appState.items) appState.items = []; }
      } catch(e) { appState.items = []; }
      if (appState.items.length === 0) createNewChair(false);
      const activeItem = getActiveItem();
      if (activeItem && !appState.activeLayer) appState.activeLayer = assetsDB.chair.parts[0];
      renderUI(); updatePrice();
      loadPrevProjectBar();
      setTimeout(() => { init3D(); }, 100);
    };

    function getActiveItem() { return appState.items.find(i => i.id === appState.activeItemId); }
    function saveState() { sessionStorage.setItem('cadState_chair_v6', JSON.stringify(appState)); }

    function createNewChair(shouldRender = true) {
      const newItem = {
        id: Date.now(), type: 'chair', name: 'Custom Chair Design ' + (appState.items.length + 1),
        selections: { Seat:'#8B4513', Back:'#8B4513', Legs:'#8B4513', Armrests:'#8B4513' },
        dims: { Seat:{w:45,h:5,d:45}, Back:{w:45,h:50,d:5}, Legs:{w:5,h:45,d:5}, Armrests:{w:5,h:25,d:5} },
        carvings: { Seat:'none', Back:'none', Legs:'none', Armrests:'none' },
        shapes: { Seat:'square_plank', Back:'simple_panel', Legs:'straight_post_s', Armrests:'l_shape_arm' },
        holes: { Seat:'none', Back:'none', Legs:'none', Armrests:'none' },
        globalScale: { x:1, y:1, z:1 },
        isLeftArmVisible: true, isRightArmVisible: true
      };
      appState.items.push(newItem);
      appState.activeItemId = newItem.id;
      appState.activeLayer = 'Seat';
      saveState();
      if (shouldRender && scene) { renderUI(); build3DScene(); updatePrice(); }
    }

    function createRockingChair() {
      const newItem = {
        id: Date.now(), type: 'chair', name: 'Rocking Chair ' + (appState.items.length + 1),
        selections: { Seat:'#8B4513', Back:'#8B4513', Legs:'#8B4513', Armrests:'#8B4513' },
        dims: { Seat:{w:50,h:6,d:48}, Back:{w:50,h:55,d:6}, Legs:{w:5,h:46,d:5}, Armrests:{w:5,h:22,d:5} },
        carvings: { Seat:'none', Back:'none', Legs:'none', Armrests:'none' },
        shapes: { Seat:'rocking_seat', Back:'rocking_back', Legs:'rocking_runners', Armrests:'rocking_arm' },
        holes: { Seat:'none', Back:'ladder_back', Legs:'none', Armrests:'none' },
        globalScale: { x:1, y:1, z:1 },
        isLeftArmVisible: true, isRightArmVisible: true
      };
      appState.items.push(newItem);
      appState.activeItemId = newItem.id;
      appState.activeLayer = 'Seat';
      saveState();
      if (scene) { renderUI(); build3DScene(); updatePrice(); }
    }

    function toggleRotation() {
      isRotating = !isRotating;
      if(controls) controls.autoRotate = isRotating;
      document.getElementById('btn-rotate').innerHTML = isRotating ? '<i class="fas fa-pause"></i> Stop Rotate' : '<i class="fas fa-play"></i> Auto Rotate';
    }
    function toggleDimensions() {
      showDimensions = !showDimensions; build3DScene();
      document.getElementById('btn-dims').innerHTML = showDimensions ? '<i class="fas fa-ruler-combined"></i> Hide Ruler' : '<i class="fas fa-ruler-combined"></i> Show Ruler';
    }
    function toggleArmrest(property, btn) {
      const item = getActiveItem(); item[property] = !item[property];
      btn.classList.toggle('active', item[property]);
      saveState(); build3DScene(); updatePrice();
    }
    function resetView() { resetCamera(); resetFocus(); build3DScene(); }
    function updateGlobalScale(axis, val) {
      const item = getActiveItem();
      if(!item.globalScale) item.globalScale = {x:1,y:1,z:1};
      item.globalScale[axis] = val / 100;
      document.getElementById('gs-' + axis).innerText = val;
      saveState(); build3DScene(); updatePrice();
    }

    /* ==========================================================================

    function renderUI() { renderSceneList(); renderProperties(); calculateScore(); updatePrice(); }

    function renderSceneList() {
      const list = document.getElementById('scene-list');
      list.innerHTML = '';

      const rockBtn = document.createElement('div');
      rockBtn.style.cssText = 'margin:8px 0 4px;padding:10px 12px;border-radius:6px;background:#1e2a1e;border:1px dashed #2e4a2e;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:0.82rem;color:#6abf6a;transition:0.15s;';
      rockBtn.innerHTML = '<i class="fas fa-rocking-chair" style="color:#6abf6a"></i><span>+ New Rocking Chair</span>';
      rockBtn.onmouseover = () => rockBtn.style.background = '#243024';
      rockBtn.onmouseout  = () => rockBtn.style.background = '#1e2a1e';
      rockBtn.onclick = () => createRockingChair();
      list.appendChild(rockBtn);

      appState.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'scene-item' + (item.id === appState.activeItemId ? ' active' : '');
        div.onclick = (e) => {
          if(e.target.closest('.btn-delete')) return;
          appState.activeItemId = item.id; appState.activeLayer = 'Seat';
          renderUI(); build3DScene();

        list.appendChild(div);
      });
    }

    function renderProperties() {
      const activeItem = getActiveItem(); if (!activeItem) return;
      document.getElementById('project-name').value = activeItem.name;
      const gs = activeItem.globalScale || {x:1,y:1,z:1};
      ['x','y','z'].forEach(axis => {
        const val = Math.round(gs[axis] * 100);
        if(document.getElementById('gs-' + axis)) document.getElementById('gs-' + axis).innerText = val;
        if(document.getElementById('inp-scale-' + axis)) document.getElementById('inp-scale-' + axis).value = val;
      });

      const recGrid = document.getElementById('rec-mat-grid');
      const allGrid = document.getElementById('all-mat-grid');
      const recContainer = document.getElementById('rec-mat-container');
      recGrid.innerHTML = ''; allGrid.innerHTML = '';
      let hasRecs = false;
      Object.keys(materialDB).forEach(k => {
        const m = materialDB[k]; if(m.rec) hasRecs = true;
        const card = document.createElement('div');
        card.className = 'mat-card-lg' + (m.rec ? ' recommended' : '');
        card.onclick = () => applyMaterialToActiveLayer(m.hex);
        card.innerHTML = '<div class="mat-card-icon">' + m.icon + '</div><div class="mat-card-name">' + m.name + '</div>';
        if(m.rec) recGrid.appendChild(card); else allGrid.appendChild(card);
      });
      recContainer.style.display = hasRecs ? 'block' : 'none';

      document.getElementById('toggle-left-arm').classList.toggle('active', activeItem.isLeftArmVisible);
      document.getElementById('toggle-right-arm').classList.toggle('active', activeItem.isRightArmVisible);

      const container = document.getElementById('layers-container');
      container.innerHTML = '';
      const shapes = activeItem.shapes || {}, holes = activeItem.holes || {};
      const carvings = activeItem.carvings || {}, selections = activeItem.selections || {};
      const itemDims = activeItem.dims || {};

      assetsDB.chair.parts.forEach(part => {
        const hex = selections[part] || '#8B4513';
        const dims = itemDims[part] || {w:50,h:50,d:50};
        const currentCarving = carvings[part] || 'none';
        const currentShapeId = shapes[part] || 'square_plank';
        const currentHoleId = holes[part] || 'none';

        let shapeName = 'Standard';
        if (shapeDB[part.toLowerCase()]) {
          const foundS = shapeDB[part.toLowerCase()].find(s=>s.id===currentShapeId);
          if (foundS) shapeName = foundS.name;
        }
        let holeName = 'Solid';
        const holeList = holeDB[part.toLowerCase()] || holeDB.default;
        const foundH = holeList.find(s=>s.id===currentHoleId);
        if (foundH) holeName = foundH.name;
        let carvingName = carvingDB[currentCarving] ? carvingDB[currentCarving].name : 'Smooth';

        const isActive = (appState.activeLayer === part);
        const layer = document.createElement('div');
        layer.className = 'layer-item' + (isActive ? ' active-layer open' : '');
        layer.onclick = (e) => {
          if(e.target.closest('.view-focus-btn') || e.target.tagName === 'INPUT' || e.target.closest('.clickable-design-val')) return;
          setActiveLayer(part);
        };

        let dimensionLabels = {w:'Width',h:'Height',d:'Depth'};
        if(part === 'Armrests') dimensionLabels = {w:'Bar W',h:'Post Height',d:'Thickness'};

        layer.innerHTML = `
          <div class="layer-header">
            <span><i class="fas fa-layer-group"></i> ${part} ${isActive ? '(Selected)' : ''}</span>
            <button class="view-focus-btn" onclick="focusOnPart('${part}')">${isActive ? '<i class="fas fa-eye"></i>' : '<i class="far fa-eye"></i>'}</button>
            <div class="color-preview" style="background:${hex}"></div>
          </div>
          <div class="layer-content">
            <div class="part-control-row">
              <div class="part-control-label">Shape / Base Style <button class="lbl-info-btn" onclick="showTooltip(event,'lyr-shape-info')"><i class="fas fa-info"></i></button></div>
              <div class="clickable-design-val" onclick="openDesignModal('${part}', 'shape')"><span>${shapeName}</span> <i class="fas fa-edit"></i></div>
            </div>
            <div class="part-control-row">
              <div class="part-control-label">Cutouts / Holes <button class="lbl-info-btn" onclick="showTooltip(event,'lyr-holes-info')"><i class="fas fa-info"></i></button></div>
              <div class="clickable-design-val" onclick="openDesignModal('${part}', 'holes')"><span>${holeName}</span> <i class="fas fa-edit"></i></div>
            </div>
            <div class="part-control-row">
              <div class="part-control-label">Carving / Texture <button class="lbl-info-btn" onclick="showTooltip(event,'lyr-carving-info')"><i class="fas fa-info"></i></button></div>
              <div class="clickable-design-val" onclick="openDesignModal('${part}', 'carving')"><span>${carvingName}</span> <i class="fas fa-edit"></i></div>
            </div>
            <div class="part-control-row">
              <div class="part-control-label">Hex Color <button class="lbl-info-btn" onclick="showTooltip(event,'lyr-color-info')"><i class="fas fa-info"></i></button></div>
              <div class="hex-wrapper">
                <input type="color" value="${hex}" oninput="updateColor('${part}', this.value)">
                <input type="text" class="hex-text-input" value="${hex}" onchange="updateColor('${part}', this.value)">
              </div>
            </div>
            <div class="part-control-row">
              <div class="part-control-label">Dimensions (cm) <button class="lbl-info-btn" onclick="showTooltip(event,'lyr-dims-info')"><i class="fas fa-info"></i></button></div>
              <div class="dim-row">
                <div class="dim-group"><input class="dim-input" type="number" value="${dims.w}" oninput="updateDim('${part}','w',this.value)"><div class="dim-label">${dimensionLabels.w}</div></div>
                <div class="dim-group"><input class="dim-input" type="number" value="${dims.h}" oninput="updateDim('${part}','h',this.value)"><div class="dim-label">${dimensionLabels.h}</div></div>
                <div class="dim-group"><input class="dim-input" type="number" value="${dims.d}" oninput="updateDim('${part}','d',this.value)"><div class="dim-label">${dimensionLabels.d}</div></div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(layer);
      });
    }

    function setActiveLayer(partName) { appState.activeLayer = partName; renderProperties(); focusOnPart(partName); }
    function applyMaterialToActiveLayer(hex) { if(!appState.activeLayer) return; updateColor(appState.activeLayer, hex); renderProperties(); }
    function updateColor(part, hex) { const item = getActiveItem(); if(!item.selections) item.selections = {}; item.selections[part] = hex; build3DScene(); saveState(); calculateScore(); updatePrice(); }
    function updateDim(part, axis, val) { const item = getActiveItem(); if(!item.dims) item.dims = {}; if(!item.dims[part]) item.dims[part] = {w:50,h:50,d:50}; item.dims[part][axis] = parseInt(val)||0; saveState(); build3DScene(); updatePrice(); }
    function updateProjectName(val) { getActiveItem().name = val; renderSceneList(); saveState(); }

    function updatePrice() {
      const activeItem = getActiveItem(); if(!activeItem) return;
      let addedCost = 0;
      const selections = activeItem.selections || {};
      const itemDims = activeItem.dims || {};
      assetsDB.chair.parts.forEach(part => {
        if (part === 'Armrests' && !activeItem.isLeftArmVisible && !activeItem.isRightArmVisible) return;
        const hex = selections[part] || '#8B4513';
        const matKey = Object.keys(materialDB).find(k => materialDB[k].hex.toLowerCase() === hex.toLowerCase()) || 'mahogany';
        const matData = materialDB[matKey] || materialDB['mahogany'];
        const d = itemDims[part] || {w:50,h:50,d:50};
        let vol = (d.w * d.h * d.d) / 5000;
        if(part === 'Armrests') vol = vol * (activeItem.isLeftArmVisible && activeItem.isRightArmVisible ? 1.8 : 1);
        addedCost += vol * matData.price;
      });
      const gs = activeItem.globalScale || {x:1,y:1,z:1};
      const scaleMultiplier = gs.x * gs.y * gs.z;
      document.getElementById('total-price').innerHTML = '&#8369;' + Math.round((assetsDB.chair.basePrice + addedCost) * scaleMultiplier).toLocaleString();
    }

    function calculateScore() {
      const activeItem = getActiveItem(); if (!activeItem) return;
      const selections = activeItem.selections || {};
      const parts = Object.values(selections);
      let totalDura = 0, totalQual = 0, recCount = 0;
      parts.forEach(hex => {
        const matKey = Object.keys(materialDB).find(k => materialDB[k].hex.toLowerCase() === hex.toLowerCase());
        if(matKey) { const mat = materialDB[matKey]; totalDura += mat.dura; totalQual += mat.qual; if(mat.rec) recCount++; } else { totalDura += 50; totalQual += 50; }
      });
      const avgDura = parts.length > 0 ? Math.round(totalDura / parts.length) : 0;
      const avgQual = parts.length > 0 ? Math.round(totalQual / parts.length) : 0;
      document.getElementById('bar-dura').style.width = avgDura + '%'; document.getElementById('score-dura-val').innerText = avgDura + '%';
      document.getElementById('bar-dura').style.background = avgDura > 80 ? '#2ecc71' : (avgDura > 50 ? 'orange' : '#e74c3c');
      document.getElementById('bar-qual').style.width = avgQual + '%'; document.getElementById('score-qual-val').innerText = avgQual + '%';
      document.getElementById('rec-status').innerHTML = recCount === parts.length ? '<i class="fas fa-check-circle" style="color:#2ecc71"></i> Optimal Choice' : '<i class="fas fa-info-circle" style="color:orange"></i> Custom Mix';
    }

    function deleteItem(id) {
      if(confirm('Delete?')) {
        appState.items = appState.items.filter(i => i.id !== id);
        if(appState.items.length === 0) createNewChair(true); else appState.activeItemId = appState.items[0].id;
        appState.activeLayer = 'Seat'; saveState(); renderUI(); build3DScene();
      }
    }

    const renderCompatDB = {
      shape: {
        seat:     { square_plank:{status:'ok'}, round_plank:{status:'ok'}, hex_plank:{status:'ok'}, oct_plank:{status:'ok'}, tapered_front:{status:'ok'}, tapered_back:{status:'ok'}, padded_seat:{status:'ok'}, curved_plank:{status:'ok'}, sculpted_saddle:{status:'ok'}, rocking_seat:{status:'ok'} },
        back:     { simple_panel:{status:'ok'}, round_back:{status:'ok'}, shield_back:{status:'ok'}, padded_back:{status:'ok'}, wingback:{status:'ok'}, balloon_back:{status:'ok'}, spindle_back:{status:'ok'}, cross_back:{status:'ok'}, ladder_back:{status:'ok'}, slat_back:{status:'ok'}, rocking_back:{status:'ok'} },
        legs:     { straight_post_s:{status:'ok'}, straight_post_r:{status:'ok'}, tapered_square:{status:'ok'}, tapered_round:{status:'ok'}, cabriole:{status:'ok'}, saber:{status:'ok'}, fluted_round:{status:'ok'}, turned_leg:{status:'ok'}, hairpin:{status:'ok'}, rocking_runners:{status:'ok'} },
        armrests: { l_shape_arm:{status:'ok'}, sloped_arm:{status:'ok'}, floating_bar:{status:'ok'}, curved_s_arm:{status:'ok'}, scroll_arm:{status:'ok'}, track_arm:{status:'ok'}, swoop_arm:{status:'ok'}, pad_arm:{status:'ok'}, rocking_arm:{status:'ok'} }
      },
      carving: { none:{status:'ok'}, rustic:{status:'ok'}, floral:{status:'ok'}, geometric:{status:'ok'}, linear_groove:{status:'ok'}, lattice:{status:'ok'}, weave:{status:'ok'}, padded:{status:'ok'}, studded:{status:'ok'}, leather_tufted:{status:'ok'} }
    };
    function getRenderStatus(type, partName, itemId) {
      try {
        if (type === 'shape')   return renderCompatDB.shape[partName.toLowerCase()]?.[itemId] || { status: 'ok' };
        if (type === 'carving') return renderCompatDB.carving?.[itemId] || { status: 'ok' };
        if (type === 'holes')   return { status: 'ok' };
      } catch(e) {}
      return { status: 'ok' };
    }

    /* ==========================================================================
       DESIGN MODAL
       ========================================================================== */
    function openDesignModal(partName, type) {
      modalState = { partName, type };
      document.getElementById('design-modal-title').innerText = 'Select ' + type.charAt(0).toUpperCase() + type.slice(1) + ' for ' + partName;
      const scrollArea = document.getElementById('design-modal-scroll');
      scrollArea.innerHTML = '';
      const legend = document.createElement('div');
      legend.className = 'render-legend';
      legend.innerHTML = '<div class="render-legend-item"><div class="legend-dot ok"></div> Fully Supported</div><div class="render-legend-item"><div class="legend-dot warn"></div> Limited / Approximated</div><div class="render-legend-item"><div class="legend-dot bad"></div> Not Rendering</div>';
      scrollArea.appendChild(legend);

      const activeItem = getActiveItem();
      let db, activeId;
      if (type === 'shape') { db = shapeDB[partName.toLowerCase()] || shapeDB.seat; activeId = (activeItem.shapes || {})[partName]; }
      else if (type === 'holes') { db = holeDB[partName.toLowerCase()] || holeDB.default; activeId = (activeItem.holes || {})[partName]; }
      else { db = carvingDB; activeId = (activeItem.carvings || {})[partName]; }

      let groups = {};
      Object.keys(db).forEach(key => {
        const item = (type === 'shape' || type === 'holes') ? db[key] : Object.assign({ id: key }, db[key]);
        const cat = item.cat || 'General Options';
        if(!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });
      Object.keys(groups).forEach(catName => {
        const title = document.createElement('div'); title.className = 'modal-section-title'; title.innerText = catName;
        scrollArea.appendChild(title);
        const grid = document.createElement('div'); grid.className = 'design-grid';
        groups[catName].forEach(item => {
          const compat = getRenderStatus(type, partName, item.id);
          const isBroken = compat.status === 'broken', isPartial = compat.status === 'partial';
          const card = document.createElement('div');
          let cardClass = 'design-card';
          if (item.id === activeId) cardClass += ' active';
          if (isBroken) cardClass += ' render-broken';
          if (isPartial) cardClass += ' render-partial';
          card.className = cardClass;
          if (!isBroken) card.onclick = () => selectDesign(item.id);
          if (compat.note) card.title = compat.note;
          const finalIcon = item.faIcon ? item.icon : (carvingDB[item.id] ? carvingDB[item.id].icon : (item.icon || 'circle'));
          let badgeHTML = '';
          if (isBroken)  badgeHTML = '<div class="render-badge badge-broken"><i class="fas fa-times-circle"></i> No Render</div>';
          if (isPartial) badgeHTML = '<div class="render-badge badge-warn"><i class="fas fa-exclamation-triangle"></i> Limited</div>';
          const overlayHTML = isBroken ? '<div class="render-broken-overlay"></div>' : '';
          card.innerHTML = `${overlayHTML}${badgeHTML}<i class="design-icon fas fa-${finalIcon}"></i><div class="design-name">${item.name}</div>`;
          grid.appendChild(card);
        });
        scrollArea.appendChild(grid);
      });
      document.getElementById('design-modal-overlay').classList.add('open');
      focusOnPart(partName);
    }

    function closeDesignModal() { document.getElementById('design-modal-overlay').classList.remove('open'); modalState = { partName: null, type: null }; }

    function selectDesign(newId) {
      const item = getActiveItem();
      if(modalState.type === 'shape') {
        if(!item.shapes) item.shapes = {};
        item.shapes[modalState.partName] = newId;
        if (shapeDB[modalState.partName.toLowerCase()]) {
          const linked = shapeDB[modalState.partName.toLowerCase()].find(s=>s.id===newId);
          if(linked && linked.carving) { if(!item.carvings) item.carvings = {}; item.carvings[modalState.partName] = linked.carving; }
        }
      } else if (modalState.type === 'holes') {
        if(!item.holes) item.holes = {};
        item.holes[modalState.partName] = newId;
      } else {
        if(!item.carvings) item.carvings = {};
        item.carvings[modalState.partName] = newId;
      }
      build3DScene(); saveState(); renderProperties(); calculateScore(); updatePrice(); closeDesignModal();
    }

    /* ==========================================================================
       TEXTURE GENERATOR
       ========================================================================== */
    function createPatternTexture(style) {
      if(textureCache[style]) return textureCache[style];
      const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#808080'; ctx.fillRect(0,0,512,512);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 15;
      if (style === 'linear_groove') { ctx.strokeStyle='#2d2d2d'; ctx.lineWidth=10; for(let i=0;i<=512;i+=64){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke();} }
      else if (style === 'lattice') { ctx.beginPath(); for(let i=-512;i<1024;i+=64){ctx.moveTo(i,0);ctx.lineTo(i+512,512);ctx.moveTo(i,512);ctx.lineTo(i+512,0);} ctx.stroke(); }
      else if (style === 'studded' || style === 'leather_tufted') { for(let x=25;x<512;x+=100) for(let y=25;y<512;y+=100){const grad=ctx.createRadialGradient(x,y,5,x,y,40);grad.addColorStop(0,"white");grad.addColorStop(1,"#808080");ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,35,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.fillStyle="rgba(0,0,0,0.5)";ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();} }
      else if (style === 'weave') { return createCaneWeaveTexture(); }
      else if (style === 'geometric') { ctx.lineWidth=10;ctx.strokeRect(50,50,412,412);ctx.strokeRect(150,150,212,212);ctx.beginPath();ctx.arc(256,256,60,0,Math.PI*2);ctx.stroke(); }
      else if (style === 'floral') { ctx.fillStyle='#ffffff';ctx.beginPath();ctx.moveTo(256,50);ctx.bezierCurveTo(150,50,150,200,256,200);ctx.bezierCurveTo(362,200,362,50,256,50);ctx.moveTo(256,462);ctx.bezierCurveTo(150,462,150,312,256,312);ctx.bezierCurveTo(362,312,362,462,256,462);ctx.fill();ctx.lineWidth=8;ctx.strokeStyle="#ffffff";ctx.beginPath();ctx.arc(100,256,50,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(412,256,50,0,Math.PI*2);ctx.stroke(); }
      else if (style === 'rustic') { for(let i=0;i<5000;i++){ctx.fillStyle='rgba(128,128,128,'+(Math.random()*0.5)+')';const x=Math.random()*512;const y=Math.random()*512;const s=Math.random()*4;ctx.fillRect(x,y,s,s*4);} }
      else if (style === 'padded') { for(let i=0;i<10000;i++){ctx.fillStyle='rgba(128,128,128,'+(Math.random()*0.2)+')';ctx.fillRect(Math.random()*512,Math.random()*512,1,1);} }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
      textureCache[style] = texture; return texture;
    }
    function createCaneWeaveTexture() {
      if(textureCache['weave']) return textureCache['weave'];
      const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle='#C19A6B'; ctx.fillRect(0,0,512,512);
      ctx.lineWidth=15; const step=40;
      for(let y=step/2;y<512;y+=step){for(let x=0;x<512;x+=step){ctx.strokeStyle='#99734D';ctx.beginPath();ctx.moveTo(x+5,y);ctx.lineTo(x+step/2-5,y);ctx.stroke();ctx.strokeStyle='#D7BDA0';ctx.beginPath();ctx.moveTo(x+step/2+5,y);ctx.lineTo(x+step-5,y);ctx.stroke();}}
      for(let x=step/2;x<512;x+=step){for(let y=0;y<512;y+=step){ctx.strokeStyle='#D7BDA0';ctx.beginPath();ctx.moveTo(x,y+5);ctx.lineTo(x,y+step/2-5);ctx.stroke();ctx.strokeStyle='#99734D';ctx.beginPath();ctx.moveTo(x,y+step/2+5);ctx.lineTo(x,y+step-5);ctx.stroke();}}
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS=THREE.RepeatWrapping; texture.wrapT=THREE.RepeatWrapping;
      textureCache['weave'] = texture; return texture;
    }

    /* ==========================================================================
       3D ENGINE
