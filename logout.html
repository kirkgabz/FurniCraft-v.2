<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FurniCraft - Logged Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #FAF8F5;
      font-family: 'Inter', sans-serif;
      text-align: center;
      color: #2A1B14;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="100" y2="100" stroke="%23000000" stroke-width="0.5" opacity="0.015"/><line x1="0" y1="100" x2="100" y2="0" stroke="%23000000" stroke-width="0.3" opacity="0.01"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
      pointer-events: none;
      z-index: 0;
    }
    .container {
      background: #FFFFFF;
      padding: 3.5rem 4rem;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(42, 27, 20, 0.06);
      max-width: 500px;
      position: relative;
      z-index: 10;
      animation: fadeUp 0.6s ease-out;
      border: 1px solid rgba(178, 106, 56, 0.1);
    }
    .icon {
      font-size: 3.5rem;
      color: #B26A38;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 1rem;
      color: #2A1B14;
    }
    p {
      color: #7A6960;
      line-height: 1.6;
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
    }
    .btn {
      background: linear-gradient(135deg, #B26A38 0%, #8E5229 100%);
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(178, 106, 56, 0.2);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(178, 106, 56, 0.3);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><i class="fas fa-door-open"></i></div>
    <h1>See you next time!</h1>
    <p>You have been successfully logged out of FurniCraft. We hope to see your newly crafted designs again soon.</p>
    <a href="front_page.html" class="btn">Return to Homepage</a>
  </div>
  <script>
    // Completely clear session and local user identity
    sessionStorage.clear();
    localStorage.removeItem('currentUserName');
    localStorage.removeItem('currentUserEmail');
    // We intentionally leave user_notifications intact in localStorage so history is preserved
  </script>
</body>
</html>
